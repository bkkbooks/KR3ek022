front:
  text: 序往余少時獲交於立齋薛先生嘗與余通書所手鈔笥襲者亡算時時竊好之弗置也嘉靖戊午余上奏官先生報病瘍比舉進士歸則先生死矣先生神於醫而尤以瘍擅名所為諸瘍書甚具凡病癃腫癰疽攣踠瘻癘經先生診治亡不立已然卒因瘍死故人多訾先生以為執泥補法不知合變嗟乎冤哉其言之也始余識先生時婦病腫瘍瀕死先生竟活之語在醫案中當是時諸醫抱藥囊環立咸愕吐舌不敢出一語而先生率意信手日劑一二不動聲色坐而收功如充國金城之兵方略豫定其正翕張動中成算即是以例先生之醫殆所謂神解者而世乃以執泥訾之豈非貴耳賤目者眾邪語云尺有所短寸有所長必若所云是越人至今存而軒岐不古也嘻亦誖矣昔揚子云作太玄法言桓譚以為必傳且謂世人親見子云故輕其書當時博聞如劉歆亦恐後人用覆醬瓿然則世之所為訾先生亡乃類是也乎乃余則以為醫顧業精否耳業誠精矣當必有排眾說而獨是之者一時知不知亡論也先生沒諸版刻漸次流散余悉為購得之而先生從子師顏復手外科樞要一編示余蓋不獨補諸刻之所未備而立凡舉要深足為瘍家指南因屬讎訂並刻之余固親見先生者方愧不能為先生之桓譚而師顏之克世家學則劉歆之慮吾知其免矣夫先生諸他著作世多有其書不論所為序本樞要論所由刻云隆慶辛未夏五既望槜李沈啟原道卿撰
