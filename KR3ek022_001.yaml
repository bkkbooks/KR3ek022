body:
  text: 卷一論瘡瘍二十六脈所主一浮脈之診浮於指下按之不足舉之有餘再再尋之狀如太過瞥瞥然見於皮毛間其主表症或為風或為虛浮大而散者心也浮而短澀者肺也浮而數者熱也而反惡寒者瘡疽之謂也洪脈之診似浮而大按舉之則泛泛然滿三部其狀如水之洪流波之湧起其主血實積熱瘡腫論曰脈洪大者瘡疽之病進也如瘡疽結膿未成者宜下之膿潰之後脈見洪大則難治若自利者不可救也滑脈之診實大相兼往來流利如珠按之則纍纍然滑也其主或為熱或為虛此陽脈也瘡疽之病膿未潰者宜內消也膿潰之後宜托裡也所謂始為熱終為虛也數脈之診按之則呼吸之間動及六至其狀似滑而數也若浮而數則表熱沉而數則裡熱也又曰諸數為熱仲景云脈數不時見則生惡瘡也又云肺脈俱數則生瘡也診諸瘡洪數者里欲有膿結也散脈之診似浮而散按之則散而欲去舉之則大而無力主氣實而血虛有表無里瘡腫膿潰之後而煩痛尚未痊退診其脈洪滑粗散者難治以其正氣虛邪氣實也又曰肢體沉重肺脈大則斃謂浮散者也長脈之診按之則洪大而長出於本位其主陽氣有餘也傷寒得之欲汗出自解也長而緩者胃脈也百病皆愈謂之長者則易治也芤脈之診似浮而軟按之中央空兩邊實其主血虛或為失血瘡腫之病診得芤脈膿潰後易治以其脈病相應故也牢脈之診按之則實而弦且沉且浮而有牢堅之意若瘰癧結腫診得牢脈者不可內消也實脈之診按舉有力而類結曰實經曰邪氣勝則實久病虛人得此最忌瘡疽之人得此宜急下之以其邪氣與臟腑俱實故也弦脈之診按之則緊而弦其似緊者為弦如按弦而不移緊如切繩而轉動以此為異春脈浮弦而平不時見則為飲為痛主寒主虛瘡疽論曰內寒外熱欲發瘡疽也緊脈之診似弦而緊按之如切繩而轉動其主切痛積癖凡瘡腫得之氣血沉澀也亦主痛也澀脈之診按之則散而復來舉之則細而不足脈澀則氣澀也亦主血虛瘡腫潰後得之無妨也短脈之診按舉則不及本位內經曰短則氣病以其無胃氣也諸病脈短者皆難治瘡腫脈短真氣短也細脈之診按之則縈縈如蛛絲而欲絶舉之如無而似有細而微其正亡陽衰也瘡腫之病脈來細而沉時值者裡虛而欲變症也微脈之診按之則軟小而極微其主虛也真氣復者生邪氣勝者危瘡腫潰後脈微而勻舉自瘥也遲脈之診按舉來遲呼吸定息方得三至其狀似緩而稍遲痼疾得之則善新疾得之則正氣虛憊瘡腫得之潰後自痊也緩脈之診按之似遲而稍駃於遲仲景云陽脈浮大而濡陰脈浮大而澀陰陽同等謂之長緩脈見長緩百疾自瘳凡瘡腫潰後其脈澀遲緩者易愈以其脈病相應是有胃氣也沉脈之診舉之不足按之方見如爛綿其主邪氣在臟也水氣得之則逆此陰脈也瘡腫得之邪氣深也伏脈之診比沉不同伏於筋下推筋而後見與沉相類而邪氣益深矣虛脈之診按之不足極大而軟輕舉指下豁然而空經曰脈虛則血虛血虛生寒陽氣不足也瘡腫脈虛宜托裡和氣養血也軟脈之診按之則如帛在水中極軟而沉細亦謂之軟其主胃氣弱瘡腫得之宜補虛排膿托裡弱脈之診似軟而極微來微而似有仲景云微弱之脈綿綿如瀉漆之絶其主血氣俱虛形精不足大抵瘡家沉遲濡弱皆宜托裡促脈之診按之則去數來時一止而復來仲景云陽盛則促主熱蓄於裡也下之則和瘡腫脈促亦宜下之結脈之診按之則往來遲緩時一止而復來仲景云陰盛則結經曰促結則生代則死代脈之診其止有常數而不忒如十動一止雖數十次皆見於十動之後如二十動一止雖數十次皆見於二十動之後代者氣衰也諸病見之不祥凡瘡腫之病脈促結者難治而況見代脈乎動脈之診見於關上無頭尾如豆大厥厥然而動搖者是也脈經曰陰陽相搏故謂之動動於陽則陽氣虛而發厥動於陰則陰氣虛而發熱是陽生於尺而動於寸陰生於寸而動於尺不可不辨也謹按脈者人身之造化病機之外見醫家之準繩不可不精究而熟察至於太溪衝陽又為診法之要生死之機也故十二經脈皆繫於生氣是氣者人之根本寸口脈平而死者生氣獨絶於內也難經云上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害是脈有根本人有元氣也夫人受氣於谷乃傳於臟腑清者為榮濁者為衛榮行脈中衛行脈外陰陽相貫如環無端周流一身晝夜各有常度其不相應者病也病至於甚脈道乃乖抑嘗治雀啄屋漏之類若因藥餌克伐所致急用參耆歸朮薑附之劑多有復生者不可遂棄而不治也論瘡瘍五善七惡主治二瘡瘍之症有五善有七惡五善見三則瘥七惡見四則危夫善者動息自寧飲食知味便利調勻膿潰腫消水鮮不臭神彩精明語聲清朗體氣和平是也此屬腑症病微邪淺更能慎起居節飲食勿藥自愈惡者乃五臟虧損之症多因元氣虛弱或因膿水出多氣血虧損或因汗下失宜榮衛消鑠或因寒涼克伐氣血不足或因峻厲之劑胃氣受傷以致真氣虛而邪氣實外似有餘而內實不足法當純補胃氣多有可生不可因其惡遂棄而不治若大渴發熱或泄瀉淋閉者邪火內淫一惡也竹葉黃耆湯氣血俱虛八珍湯加黃耆麥門五味山茱萸如不應佐以加減八味丸煎服膿血既泄腫毒尤甚膿色敗臭者胃氣虛而火盛二惡也人參黃耆湯如不應用十全大補湯加麥門五味目視不正黑睛緊小白睛青赤瞳子上視者肝腎陰虛而目系急三惡也六味丸料加炒山梔麥門五味如不應用八珍湯加炒山梔麥門五味喘粗氣短恍惚嗜臥者脾肺虛火四惡也六君加大棗生薑如不應用補中益氣湯加麥門五味心火刑剋肺金人參平肺散陰火傷肺六味丸加五味子煎服肩背不便四肢沉重者脾腎虧損五惡也補中益氣湯加山茱萸山藥五味如不應用十全大補湯加山茱萸山藥五味不能下食服藥而嘔食不知味者胃氣虛弱六惡也六君子湯加木香砂仁如不應急加附子聲嘶色敗唇鼻青赤面目四肢浮腫者脾肺俱虛七惡也補中益氣湯加大棗生薑如不應用六君子湯加炮姜更不應急加附子或用十全大補湯加附子炮姜腹痛泄瀉咳逆昏憒者陽氣虛寒氣內淫之惡症急用托裡溫中湯復用六君子湯加附子或加薑桂溫補此七惡之治法者也此外更有潰後發熱惡寒作渴或怔忡驚悸寤寐不寧牙關緊急或頭目赤痛自汗盜汗寒戰咬牙手撒身熱脈洪大按之如無或身熱惡衣欲投於水其脈浮大按之微細衣厚仍寒此血氣虛極傳變之惡症也若手足逆冷肚腹疼痛泄痢腸鳴飲食而入厄逆嘔吐此陽氣虛寒氣所乘之惡症也若有汗而不惡寒或無汗而惡寒口噤足冷腰背反張頸項徑強此血氣虛極變痙之惡症也急用參耆歸朮附子救之間有可生者大抵虛中見惡症者難治實症無惡候者易治宋時齊院令雖嘗纂其狀而未具其因皇明陶節庵雖各立一方亦簡而未悉余故補其缺云論瘡瘍當明本末虛實三瘡瘍之作皆由膏粱厚味醇酒炙爆房勞過度七情鬱火陰虛陽輳精虛氣節命門火衰不能生土榮衛虛弱外邪所襲氣血受傷而為患當審其經絡受證標本緩急以治之若病急而元氣實者先治其標病緩而元氣虛者先治其本或病急而元氣又虛者必先於治本而兼以治標大要腫高臖痛膿水稠黏者元氣未損也治之則易漫腫微痛膿水清稀者元氣虛弱也治之則難不腫不痛或漫腫黯黑不潰者元氣虛甚治之尤難者也主治之法若腫高焮痛者先用仙方活命飲解之後用托裡消毒散漫腫微痛者用托裡散如不應加薑桂若膿出而反痛氣血虛也八珍湯不作膿不腐潰陽氣虛也四君加歸耆肉桂不生肌不收斂脾氣虛也四君加芍藥木香惡寒憎寒陽氣虛也十全大補加薑桂晡熱內熱陰血虛也四物加參術欲嘔作嘔胃氣虛也六君加炮姜自汗盜汗五臟虛也六味丸料加五味子食少體倦脾氣虛也補中益氣加茯苓半夏喘促咳嗽脾肺虛也前湯加麥門五味欲嘔少食脾胃虛也人參理中湯腹痛泄瀉脾胃虛寒也附子理中湯小腹痞足脛腫脾腎虛也十全大補湯加山茱萸山藥肉桂泄瀉足冷脾腎虛寒也前藥加桂附熱渴淋祕腎虛陰火也加減八味丸喘嗽淋祕肺腎虛火也補中益氣湯加減八味丸大凡怯弱之人不必分其腫潰惟當先補胃氣或疑參耆滿中間有用者又加發散敗毒所補不償所損又有泥於氣質素實或有痰不服補劑者多致有誤殊不知瘡瘍之作緣陰陽虧損其膿既泄氣血愈虛豈有不宜補者哉故丹溪先生云但見腫痛參之脈症虛弱便與滋補氣血無虧可保終吉論瘡瘍用針宜禁四瘡瘍之症毒氣已成者宜用托裡以速其膿膿成者當驗其生熟深淺而針之若腫高而軟者發於血脈腫下而堅者發於筋脈肉色不變者附於骨也小按便痛者膿淺也大按方痛者膿深也按之而不復起者膿未成也按之而復起者膿已成也膿生而用針氣血既泄膿又難成若膿熟而不針腐潰益深瘡口難斂若瘡深而針淺內膿不出外血反泄若瘡淺而針深內膿雖出良肉受傷若元氣虛弱必先補而後針其膿一出諸症自退若膿出而反痛或煩躁嘔逆皆由胃氣虧損宜急補之若背瘡熱毒熾盛中央肉黯內用托裡壯其脾胃外用烏金膏塗於黯處其赤處漸高黯處漸低至六七日間赤黯分界自有裂紋如刀劃然黯肉漸潰矣當用鈚針利剪徐徐去之須使不知疼痛不見鮮血為妙雖有裂紋膿未流利及膿水雖出而仍痛者皆未通於內並用針於紋中引之患於背胛之間肉腐膿出腫痛仍作此內有毒筋間隔膿未通耳尤宜引之若元氣虛弱誤服克伐患處不痛或肉將死急溫補脾胃亦有生者後須純補之藥庶可收斂若妄用刀針去肉出血則氣無所依附氣血愈虛元氣愈傷矣何以生肌收斂乎論瘡瘍欲嘔作嘔五瘡瘍作嘔不可泥於毒氣內攻而概用敗毒等藥如熱甚焮痛邪氣實也仙方活命飲解之作膿焮痛胃氣虛也托裡消毒散補之膿熟脹痛氣血虛也先用托裡散後用針以泄之焮痛便祕熱蘊於內也內疏黃連湯導之若因寒藥傷胃而嘔者托裡健中湯胃寒少食而嘔者托裡益中湯中虛寒淫而嘔者托裡溫中湯肝木乘脾土而嘔者托裡抑青湯胃脘停痰而嘔者托裡清中湯脾虛自病而嘔者托裡益黃湯鬱結傷脾而嘔者托裡越鞠湯若不詳究其源而妄用攻毒之藥則腫者不能潰潰者不能斂矣丹溪雖曰腫瘍時嘔當作毒氣攻心治之潰瘍時嘔當作陰虛補之殊不知此大概言之耳即內經諸痛癢瘡皆屬心火之意況今之熱毒內攻而嘔者寡脾胃虛寒而嘔者多豈可執前聖之言而藥今人之病歟治驗進士張德泓背疽微腫微赤飲食少思余用六君等藥膿成而潰再用大補陽氣之類肉生而斂忽寒熱作嘔患處作腫候其脈浮大鼓指按之若無形氣殊倦余謂之曰此胃氣虛憊非瘡毒也彼云果因侵晨登廁聞穢氣始作信夫先生胃虛之說也用托補而斂一男子腹患癰腫硬不潰乃陽氣虛弱嘔吐少食乃胃氣虛寒法當溫補脾胃假如腫赤痛甚煩躁脈實而嘔為有餘當下之腫硬不潰脈弱而嘔為不足當補之若痛傷胃氣或感寒邪穢氣而嘔者雖腫瘍猶當助胃壯氣彼不信仍服攻伐藥而果歿論瘡瘍用汗下藥六仲景先生治傷寒有汗吐下三法東垣先生治瘡瘍有疏通托裡和榮衛三法用之得宜厥疾瘳矣假如瘡瘍腫硬木悶煩熱便祕脈沉而實其邪在內當先疏其內以下之焮腫作痛便利調和脈浮而洪其邪在表當先托其里以汗之元戎云榮衛充滿抑遏而為癰者當泄之以奪盛熱之氣榮衛虛弱壅滯而為癰者當補之以接虛怯之氣又東垣先生云瘡瘍雖面赤伏熱不得攻裡裡虛則下利仲景先生云瘡家雖身體疼痛不可發汗汗之則發痙苟不詳審妄為汗下以致血氣虧損毒反延陷少壯者難以潰斂老弱者多致不救治驗給事錢南郭患腹癰已成余用托裡之藥漸起發彼惑於衆論用行氣破血以圖內消形體甚倦飲食益少患處頓陷色黯堅硬按之不痛余用大補之劑色赤腫起膿熟針之再用托裡腫硬漸消而愈一男子腹內作痛腹外微腫或用藥汗之外無形色脈數無力此元氣虧損毒不能外起遂與參耆歸術之類數劑漸發於外又數劑膿成而欲針之惑於人言用大黃白芷穿山甲之類引膿從便出以致水瀉不止患處平陷自汗盜汗發熱作渴不食仍用前藥加半夏陳皮薑桂四劑形氣漸復又數劑針去其膿仍用補劑喜年幼未婚得痊論瘡瘍圍寒涼之藥七內經云五臟不和九竅不通六腑不和留結為癰又云形傷痛氣傷腫此則臟腑不和瘡發於外也明矣塗貼寒涼豈能調和臟腑宣通氣血耶設使腫痛熱渴脈滑數而有力屬純陽宜內用濟陰丹外用益陽散則熱毒自解瘀滯自散若似腫非腫似痛非痛似潰不潰似赤不赤脈洪數而無力屬半陽半陰宜內用沖和湯外用陰陽散則氣血自和瘀滯自消若微腫微痛或色黯不痛或堅硬不潰脈洪大按之微細軟弱屬純陰宜內服回陽湯外敷抑陰散則脾胃自健陽氣自回丹溪先生云敷貼之劑應酬輕小熱症耳若不辨其陰症陽症之所由分而妄敷寒涼之劑迷塞腠理凝滯氣血毒反內攻而肉反死矣況運氣得寒而不健瘀血得寒而不散瘀肉得寒而不潰新肉得寒而不生治者審焉治驗閣老翟石門子耳下作痛內服外敷皆寒涼敗毒更加腫痛項間腫硬肉色如故內焮連胸余適考滿到京邀視之雖腫堅而脈滑數此膿內潰也雖足三陽熱毒之症為寒涼凝結不能外潰先用六君子補中益氣各二劑謂補脾胃升發陽氣患處亦軟針出瘀膿甚多仍服至數劑而愈地官李北川腿患癰內外用敗毒寒涼因痛極刺出瘀膿方知為癰瘡口開張肉紫冷陷外無腫勢此陽氣虛寒而不能收斂用豆豉餅六君子加藿香砂仁炮姜飲食進而患處暖再以十全大補湯元氣復而瘡口愈一男子腿腫一塊經年不消飲食少思強食則脹或作瀉日漸消瘦兩尺脈微細此命門火衰不能生土以致脾胃虛寒以八味丸治之飲食漸進腫患亦消論瘡瘍泥用定痛散八瘡瘍之作由六淫七情所傷其痛疏也因氣血凝滯所致假如熱毒在內便祕而作痛者內疏黃連湯導之熱毒熾盛焮腫而作痛者黃連解毒散治之不應仙方活命飲解之瘀血凝滯而作痛者乳香定痛散和之作膿而痛者托裡消毒散排之膿脹而痛者針之膿潰而痛者補之若因氣虛而痛四君加歸耆血虛而痛四物加參耆腎虛而痛六味地黃丸口乾作渴小便頻數者加減八味丸此皆止痛之法也丹溪先生云膿出而反痛此為虛也宜補之穢氣所觸者和解之風寒所逼者溫散之若泥用乳沒斯執方矣治驗鴻臚蘇龍溪小腹內腫脹作痛大小便祕結作渴飲冷脈洪數而實用黃連解毒二劑腫痛頓止二便調和用活命飲而全愈一儒者臀患癰腫焮痛甚用活命飲隔蒜灸而消後因飲食勞倦腫痛惡寒發熱頭疼用補中益氣湯頻用蔥尉法兩月餘而消一婦人脅下作痛色赤寒熱用小柴胡湯加山梔川芎以清肝火而愈但經行之後患處作痛用八珍湯以補氣血而安若肝膽二經血燥氣逆所致當用小柴胡湯加山梔膽草芎歸主之若久而脾胃虛弱用補中益氣為主若兼氣鬱傷脾而患間以歸脾湯若朝涼暮熱飲食少思須以逍遙散為主論瘡瘍用生肌之藥九夫肌肉者脾胃之所主收斂者氣血之所使但當純補脾胃不宜泛敷生肌之劑夫瘡不生肌而色赤甚者血熱也四物加山梔連翹色白而無神者氣虛也四君加當歸黃耆晡熱內熱陰血虛也四物加參術膿水清稀者氣血虛也十全大補湯食少體倦脾氣虛也補中益氣湯煩熱作渴飲食如常胃火也竹葉黃耆湯不應竹葉石膏湯熱渴而小便頻數腎水虛也用加減八味丸料煎服若敗肉去後新肉微赤四沿白膜者此胃中生氣也但用四君子湯以培補之則不日而斂若妄用生肌之藥餘毒未盡而反益甚耳殊不知瘡瘍之作由胃氣不調瘡瘍之潰由胃氣腐化瘡瘍之斂由胃氣榮養東垣先生云胃乃生髮之源為人身之本丹溪先生亦謂治瘡瘍當助胃壯氣使根本堅固誠哉是言也可不慎歟治驗銀臺鄭敬齊腿患癰瘡口不斂余考績到京請治者皆用十宣散之類云旬日收斂至今未應何也余診其脈浮大按之微細此因脾氣虛弱遂用補中益氣加茯苓半夏壯其脾胃不數日而瘡斂矣昆庠王子大背患疽年餘瘡口少許不斂色黯陷下面色痿黃形氣怯弱脈浮緩而澀此脾肺氣虛也用十全大補湯加附子少許數劑而元氣漸復卻去附子又三十餘劑全愈而領鄉薦論瘡瘍去腐肉十瘡瘍之症膿成者當辨其生熟淺深肉死者當驗其腐潰連脫丹溪先生云癰疽因積毒在臟腑當先助胃壯氣為主使根本堅固而行經活血佐之令其內消余嘗治脈症虛弱者用托裡之藥則氣血壯而肉不死脈證實熱者用清熱之劑則毒氣退而肉自生凡瘡聚於筋骨之間肌肉之內皆因血氣虛弱用十全大補湯壯其脾胃則未成自散已成自潰又何死肉之有若不大痛或不痛或不赤或內膿不潰或外肉不腐乃氣血虛弱宜用桑枝灸及十全大補加薑桂壯其陽氣則四畔即消瘡頭即腐其毒自解又何待於針割若脾胃虛弱飲食少思用六君倍加白朮壯其榮氣則肌肉受毒者自活已死者自潰已潰者自斂若初起或因克伐或犯房事以致色黯而不痛者乃陽氣脫陷變為陰症急用參附湯溫補回陽亦有可生治驗吳庠史邦直之內仲夏患背疽死肉不潰發熱痛甚作嘔少食口乾飲湯脈洪大按之如無此內真寒而外假熱當舍時從症先用六君加炮薑肉桂四劑飲食頓進諸症頓退復用十全大補湯仍加姜桂之類五十餘劑而死肉潰又五十餘劑而新肉生斯人氣血充盛而瘡易起易斂使醫者逆知預為托裡必無此患論瘡瘍未潰用敗毒之藥十一瘡瘍之症當察經之傳受病之表裡人之虛實而攻補之假如腫痛熱渴大便祕結者邪在內也疏通之腫焮作痛寒熱頭疼者邪在表也發散之焮腫痛甚者邪在經絡也和解之微腫微痛而不作膿者氣血虛也補托之漫腫不痛或不作膿或膿成而不潰者氣血虛甚也峻補之色黯而微腫痛或膿成不出或腐肉不潰者陽氣虛寒也溫補之若泥其未潰而概用敗毒復損脾胃不惟腫者不能成膿而潰者亦難收斂七惡之症蜂起多致不救丹溪先生云腫瘍內外皆壅宜以托裡表散為主如欲用大黃寧無孟浪之非潰瘍內外皆虛宜以托裡補接為主如欲用香散未免虛虛之失治者審之治驗一男子不慎房勞背胛腫高三寸許闊徑尺余自汗盜汗內熱發熱口乾飲湯脈浮大按之弱澀此精虛氣節為患用十全大補加麥門五味山茱山藥四劑諸症悉退因余他往別用流氣飲一劑虛症悉具腫硬如石余仍以前藥六劑而愈一儒者背腫一塊按之則軟肉色如故飲食如常勞則吐痰體倦此脾氣虛而痰滯用補中益氣加茯苓半夏少加羌活外用陰陽散以薑汁調搽而消後因勞頭暈作嘔仍以前藥去羌活加生薑蔓荊子而愈昆庠馬進伯母左胛連脅作痛遣人索治余意此鬱怒傷肝脾用六君加桔梗枳殼柴胡升麻彼別用瘡藥益甚始請治其脈右關弦長按之軟弱左關弦洪按之澀滯乃脾土不及肝木太過因飲食之毒七情之火也遂用前藥四劑脈症悉退再加芎歸全愈此等症誤用行氣敗毒破血導痰以致不起者多矣論瘡瘍用針勿忌尻神十二針灸之法有太乙人神周身血忌逐年尻神逐日人神而其穴有禁針禁灸之論犯之者其病難瘳理固然也但瘡瘍氣血已傷肌肉已壞宜迎而奪之順而取之非平人針灸之比何忌之有外科精義云瘡瘍之症毒氣無從而解膿瘀無從而泄反攻於內內既消敗欲望其生豈可得乎危惡之發於致命之所禍在反掌腹癰囊癰二便不通胸腹脹悶唇疔喉痹咽喉腫塞其禍尤速患者審之論瘡瘍陽氣脫陷十三瘡瘍陽氣脫陷或因克伐之劑或因膿血大泄或因吐瀉之後或因誤而入房若發熱頭痛小便淋澀或滑數便血目赤煩喘自汗發熱氣短頭暈體倦熱渴意欲飲水投水惡寒憎寒身熱惡衣揚手擲足汗出如水腰背反張擲聲不絶此無根虛火之假熱症若畏寒頭痛咳逆嘔吐耳瞶目蒙小便遺難瀉利腸鳴裡急腹痛玉莖短縮冷汗時出牙齒浮痛肢體麻痹或厥冷身痛或咬舌齧唇舌根強硬此陽氣脫陷之真寒症皆勿論其脈勿論其瘡但見一二急用參附湯補之多有復生者大凡潰後勞役元氣虧損或夢遺精脫或滑數便血或外邪乘之或誤用寒涼氣血脫陷而致斯症治以前藥亦有復生者治驗內翰楊皋湖孟夏患背疽服克伐之劑二旬余矣漫腫堅硬重如負石隔蒜灸五十餘壯背遂輕以六君加砂仁二劑涎沫湧出飲食愈少此脾虛陽氣脫陷劑用溫補反嘔不食仍用前藥作大劑加附子薑桂又不應遂以參耆各一斤歸朮陳皮各半斤附子一兩煎服三日而盡流涎頓止腐肉頓潰飲食頓進再用薑桂等藥托裡健脾腐脫而瘡愈矣少參史南湖之內夏患疽不起發脈大而無力發熱作渴自汗盜汗用參耆大補之劑益加手足逆冷大便不寬喘促時嘔脈微細按之如無惟太衝不絶仍以參耆白朮當歸茯苓陳皮計斤許加附子五錢水煎二鍾作一服諸症頓退脈息頓復翌日瘡起而潰仍用前藥四劑後日用托裡藥調理兩月餘而消遜婦臥床十三年矣嘉靖癸卯遭回祿益加憂鬱甲辰三月右肩下發一塊焮腫如甌中赤外白先用涼藥一劑不解次用十宣散四劑加痛略紅迎徐南樓視之連投參耆丁桂防芷之劑膿潰徐云無恙矣辭後眩暈嘔逆惡寒戰栗項陷膿清偶檢翁外科發揮至發背門云若初起一頭如黍不腫不赤煩躁便祕四五日間生頭不計其數瘡口各如含一粟名曰蓮房發云云始駭為惡症治法雖詳不諳於行迎翁至診云辛涼解散氣血兩虛者忌之連投參耆歸朮地黃薑附大劑腫高膿稠兼衽烏金膏數日果腐落筋如脂膜者數片人參每服加至八錢日進二服逾兩月平復立齊翁術之淵藪他醫孰能知之病婦非翁必誤入鬼録矣謹附此以告後人毋為時醫之誤當知翁術之奇布在方策德澤普濟與天地同悠久矣晚生陳遜頓首識論瘡瘍發熱煩躁十四瘡瘍發熱煩躁或出血過多或潰膿大泄或汗多亡陽或下多亡陰以致陰血耗散陽無所依浮散於肌表之間而非火也若發熱無寐血虛也用聖愈湯兼汗不止氣虛也急用獨參湯發熱煩躁肉瞤筋惕氣血虛也用八珍湯大渴面赤脈洪大而虛陰虛發熱也用當歸補血湯肢體微熱煩燥面赤脈沉而微陰盛發躁也用四君加薑附東垣云晝發熱而夜安靜是陽氣自旺於陽分也晝安靜而夜發熱是陽氣下陷於陰中也如晝夜俱發熱者重陽無陰也當峻補其陰故王太僕云如大寒而甚熱之不熱是無火也當治其心如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不勝寒是無火也寒不勝熱是無水也夫寒之不寒責其無水熱之無熱責其無火熱之不久責心之虛寒之不久責腎之弱治者當深味之治驗操江都憲伍松月背瘡愈後大熱誤為熱火用苦寒藥一鍾寒熱益甚欲冷水浴身脈浮大按之全無余曰此陽氣虛浮於肌表無根之火也急用六君子加附子一劑即愈春元沈震川之內暑月面生痤癤乘涼入風面目浮腫越二日左臂腫痛癮疹如丹背脅髀股等處發腫塊三四肉色不紅痛甚晝夜呼號寒熱往來飲食不思服活命飲及行氣敗毒之劑其勢愈熾肝脈浮澀脾脈弦弱此屬二經榮氣不行風邪乘虛流注經絡為患先以八珍加黃耆柴胡青皮數劑腫處漸漸紅臖又以十全大補加金銀花白芷龍膽草貝母十餘劑脅腿二處潰膿碗許余塊漸平仍服十全大補湯調理月餘而安向使專於祛風攻毒鮮不敗事矣一儒者患流注發熱作渴頭痛自汗脈洪大按之無力此氣血虛寒也用十全大補加麥門五味治之其症益甚仍用前藥加附子一錢四劑諸症悉退卻去附子加肉桂二十餘劑氣血漸復又因勞心發熱惡寒飲食減少此脾胃復傷元氣下陷用補中益氣加附子一錢二劑熱止食進仍用大補元氣而安後因考試不利懷抱不舒更兼勞役飲食日少形氣日衰吐痰作渴頭痛惡寒或熱來復去或不時而動仍用補中益氣數劑諸症漸愈元氣漸復乃去附子再加肉桂五分百餘劑而愈一男子背瘡不斂小便赤澀臖腫發熱口乾體倦脈洪數而無力用參耆歸朮熟地芎芍陳皮麥門五味炙草肉桂以補元氣引火歸經脈症益甚此藥力未能及也再劑頓退卻去肉桂又數劑而愈此症因前失補元氣故耳論瘡瘍輕症用重劑十五人身血氣有虛實瘡瘍所發有輕重治療之法有攻補元戎云若人氣血壅盛榮衛充滿抑遏不行腐化而為癰者當泄之以奪盛熱之氣若人飲食少思精神衰弱榮衛短澀寒搏而為癰者當補之以接虛怯之氣丹溪先生云腫瘍內外皆虛宜以補接行散為主大抵用藥之法如執權衡當察病勢輕重邪蓄表裡瘡毒腫潰元氣虛實若不詳究其因率爾投治實實虛虛七惡之禍不能免矣治者審之治驗吳庠盛原博掌後患疔紅絲至腕惡寒發熱勢屬表症與奪命丹一服紅絲頓消又用和解之劑大勢已退彼別服敗毒藥發熱口乾紅絲仍見脈浮大而虛此氣血受傷而然以補中益氣湯主之而愈蓋奪命敗毒性尤猛烈瘡邪已散而復用之是誅伐太過失內經之旨矣一儒者元氣素弱余補其氣血出膿而愈後因勞役瘡痕作癢乃別服敗毒藥一劑以致口噤舌強手足搐搦痰涎上湧自汗不止此氣血傷而發痙也用十全大補加附子一錢灌服而蘇一男子患疔服奪命丹汗不止而瘡不痛熱不止而便不利此汗多亡陽毒氣盛而真氣傷矣用參耆歸朮芍藥防風五味二劑諸症悉愈惟以小便不利為憂余曰汗出不宜利小便汗既止陽氣復而自利矣仍用前藥去防風加麥門倍用當歸黃耆四劑便行瘡潰而愈論瘡瘍當舍時從症十六經云諸痛癢瘡瘍皆屬心火若腫赤煩躁發熱引冷便祕作渴脈洪數實是其常也雖在嚴寒之時必用大苦寒之劑以瀉熱毒若脈細皮寒瀉利腸鳴飲食不入嘔吐無時手足逆冷是變常也雖在盛暑之時必用大辛溫之劑以助陽氣內經曰用寒遠寒用熱遠熱有假者反之雖違其時必從其症論瘡瘍大便祕結十七東垣先生云瘡瘍熱毒深固嘔啘心逆發熱而煩脈沉而實腫硬木悶大便祕結此毒在臟宜疏通之故曰疏通其內以絶其源又曰瘡瘍及諸病面赤雖伏火熱不得妄攻其里而陽氣拂鬱邪氣在經宜發表以去之故曰火鬱則發之凡大便不通飲食雖多肚腹不脹切不可通若腹痞脹而不通者乃直腸乾涸也宜用豬膽汁導之若腸胃氣虛血涸而不通者宜用十全大補湯培補之若瘡症屬陽或因入房傷腎而不通者宜用前湯加薑附回陽多有得生者經云腎開竅於二陰藏精於腎津液潤則大便如常若潰瘍有此因氣血虧損腸胃乾涸當大補為善設若不審虛實而一於疏利者鮮有不誤治驗舍親居賓鷗仲夏患發背黯腫尺余皆有小頭如鋪黍狀四日矣此真氣虛而邪氣實遂隔蒜灸服活命飲二劑其邪頓退乃純補其真又將生脈散以代茶飲瘡邪大退余因他往三日復視之飲食不入中央肉死大便祕結小便赤濁余曰中央肉死毒氣盛而脾氣虛也大便不通腸虛而不能傳送小便赤濁脾虛而火下陷治亦難矣彼始云莫非間斷補藥之過余曰然乃急用六君子加當歸柴胡升麻飲食漸進大便自通外用烏金膏塗中央三寸許四圍紅腫漸消中央黑腐漸去乃敷當歸膏及地黃丸與前藥間服將百劑而愈一男子腿患癰因服克伐虧損元氣不能成膿余為托裡而潰大補而斂但大便結燥用十全大補湯加麥門五味而潤月餘仍結惑於人言乃服潤腸丸而瀉不止余用補中益氣送四神丸數服而止論瘡瘍大便瀉利十八瘡瘍大便泄瀉或因寒涼克伐脾氣虧損或因脾氣虛弱食不克化或因脾虛下陷不能升舉或因命門火衰不能生土或因腎經虛弱不能禁止或因脾腎虛寒不能司職所主之法若寒涼傷脾用六君加木香砂仁送二神丸脾虛下陷用補中益氣送二神丸命門火衰用八味丸料送四神丸腎虛不禁用姜附湯加吳茱萸五味脾腎虛寒用參附湯送四神丸病機云脈沉而細身不動作睛不了了飲食不下鼻準氣息者姜附湯主之身重四肢不舉者參附湯主之仲景先生云下利腸鳴當溫之脈遲緊痛未止當溫之大孔痛當溫之心痛當救里可與理中附子四逆輩精要云癰疽嘔瀉腎脈虛者不治此發內經之微旨也凡此實難治之症如按前法治之多有可生者治驗御醫王彭峰之內年逾四十背疽不起發泄瀉作嘔食少厥逆脈息如無屬陽氣虛寒用大補劑加附子薑桂不應再加附子二劑瀉愈甚更以大附子薑桂各三錢參耆歸術各五錢作一劑腹內始熱嘔瀉乃止手足漸溫脈息遂復更用大補而潰再用托裡而斂十年後仍患脾胃虛寒歿論瘡瘍小便淋漓頻數不利十九瘡瘍小便淋漓頻數或莖中澀者腎經虧損之惡症也宜用加減八味丸以補陰足脛逆冷者宜用八味丸以補陽若小便頻而黃者宜用四物湯加麥門參朮五味以滋肺腎若小便短而少者宜用補中益氣加山藥麥門五味以補脾肺若熱結膀胱而不利者宜用五淋散以清熱若脾氣燥而不能化者宜用黃芩清肺飲以滋陰若膀胱陰虛陽無以生者宜用六味丸若膀胱陽虛陰無以化者宜用滋腎丸腎虛之患多傳此症非滋化源不救若用黃柏知母反瀉其陽以速其危若老人陰痿思色精內敗莖中痛而不利者用加減八味丸加車前牛膝不應更加附子多有復生者若精已竭而復耗之大小便中牽痛愈痛則愈便愈便則愈牽痛以前藥加附子亦有復生者王太僕云無陰則陽無以化無陽則陰無以生當滋其化源苟專用淡滲復損真陰乃速其危也治驗職坊王的塘背疽潰後小便淋漓或時自遺作渴引飲煩熱不寐瘡口焮赤時或如灼時或便遺余曰此腎虛之惡症用加減八味丸加麥門數劑而痊太守朱陽山患背疽漫腫色黯微痛作渴瘡頭數十左尺洪數按之無力此腎虛之症先用活命飲二劑以殺其毒午前以參耆歸術之類壯氣血午後以加減八味丸料固腎氣喜其未用敗毒之藥元氣未損故數日膿出肉腐而愈駕部林汝玉冬不衣綿作渴飲冷每自喜壯實曬余衣綿診其脈數大無力余曰至火令當求余也三月間果背熱便祕脈沉用四物加芩連山梔數劑大便稍和卻去芩連加參朮茯苓二十餘劑及前丸半斤許渴減六七背熱亦退至夏背發一疽純用托裡之劑而斂封君袁懷雪背疽發熱作渴脈數無力用四物加黃柏知母玄參山梔連翹五味麥門銀花背疽漸退又加白芷參耆腐肉盡潰因停藥且勞熱渴仍作乃以參耆歸芷炙草山藥山茱茯苓澤瀉肉桂而愈又以六味丸及十全大補而斂論瘡瘍作渴二十瘡瘍作渴若焮痛發熱便利調和者上焦熱也用竹葉石膏湯腫痛發熱大便祕澀者內臟熱也用四順清涼飲焮腫痛甚者熱毒蘊結也用仙方活命飲漫腫微痛者氣血虛壅也用補中益氣湯若因胃火消爍而津液短少者用竹葉黃耆湯若因胃氣虛而不能生津液者用補中益氣湯若因胃氣傷而內亡津液者用七味白朮散若因腎水乾涸作渴或口舌乾燥者用加減八味丸或先口乾作渴小便頻數而後患疽或疽愈後作渴飲水或舌黃乾硬小便數而疽生者尤其惡也苟能逆知其因預服加減八味丸補中益氣湯以滋化源可免後患論瘡瘍出血二十一瘡瘍出血因五臟之氣虧損虛火動而錯經妄行也當求其經審其因而治之若肝熱而血妄行者四物炒梔丹皮苓術肝虛而不能藏血者六味地黃丸心虛而不能主血者四物炒連丹皮芩術脾虛熱而不能統血者四君炒梔丹皮若脾經鬱結用歸脾湯加五味子脾肺氣虛用補中益氣加五味子氣血俱虛用十全大補陰火動用六味丸加五味子大凡失血過多見發熱作渴等症勿論其脈急用獨參湯以補氣經云血生於氣苟非參耆歸術甘溫等劑以生心肝之血決不能愈若發熱脈大者不治凡患血症皆當以犀角地黃湯為主治驗翰林屠漸山年四十患濕毒瘡疾誤用輕粉之劑虧損元氣久不能愈一日將晡之際診之肝脈急洪數而有力余曰何肝脈之如此侵晨瘡出黯血三四碗體倦自汗雖甚可畏所喜血黯而脈靜余曰此輕粉之熱血受其毒而妄行輕粉之毒亦得以泄邪氣去而真氣虛也當急用獨參湯主之余重其為人體恤甚篤但惑於他言不果致邪氣連綿不已惜哉一男子背瘡出血煩躁作渴脈洪大按之如無此血脫髮躁用當歸補血湯二劑少愈又以八珍湯加黃耆山梔數劑全愈一婦人潰後吐鮮血三碗許余用獨參湯而血止用四君熟地芎歸而瘡愈此血脫補氣陽生陰長之理也若用涼血降火沉陰之劑脾胃生氣復傷不惟血不歸源而死無疑矣一老婦手大指患疔為人針破出鮮血手背俱腫半體皆痛神思昏憒五日矣用活命飲始知痛在手瘡勢雖惡不宜大攻再用大補劑又各一劑外用隔蒜灸喜此手背赤腫而出毒水又各一劑赤腫漸潰又用托裡藥而瘥南儀部賀朝卿升山西少參別時余見其唇鼻青黑且時搔背問其故曰有一小瘡耳余視之果疽也此脾胃敗壞為不治之症余素與善悲其途次不便殯殮遂托其僚友張東沙輩強留之勉與大補但出紫血虛極也或謂毒熾不能為膿乃服攻毒藥一鍾以致嘔逆脈脫果卒於南都僉憲張碧崖腰患疽醉而入房脈洪數兩尺更大余辭不治將發舟其子強留頃間吐臭血五六碗余意此腎經虛火而血妄行血必從齒縫出將合肉桂等補腎制火之藥各用罐別煎熟聽用血止拭齒視之果然遂合一鍾冷服之熱渴頓止少頃溫服一鍾脈細欲說氣息奄奄得藥則脈少復良久仍脫其子疑內有膿欲刺之余曰必無乃以鵝翎管衽內果如余言次日脈脫腳寒至膝腹內如冰急用六君加薑附腹始溫膿始潰瘡口將完彼因侍者皆愛妾又患小便不通此陰已痿而思色以降其精精內敗不出而然耳用加減八味丸料加參耆白朮一劑小便雖愈瘡口不斂而歿
