body:
  text: 卷三論臀癰一男婦同用臀膀胱經部分也居小腹之後此陰中之陰其道遠其位僻雖太陽多血氣運難及血亦罕到中年後尤慮此患治者毋傷脾胃毋損氣血但當固根本為主若腫硬作痛者形氣虛而邪氣實也用托裡消毒散主之微腫微痛者形氣病氣俱虛也用托裡散補之欲作膿用托裡羌活湯若痛甚用仙方活命飲大勢既退亦用托裡消毒散若脾虛不能消散或不潰不斂者六君子加芎歸黃耆若陰虛不能消散或作渴便淋者六味丸加五味子若陽虛不能潰或膿清不能斂者用補中益氣湯氣血俱虛者十全大補湯若腫硬未成膿者用隔蒜灸活命飲潰後豆豉餅補中益氣十全大補二湯若灸後大勢已退餘毒未消頻用蔥尉以補其氣以消餘毒為善治驗巡撫陳和峰脾胃不健常服消導之劑左腿股及臀患腫余曰此脾氣虛而下注非瘡毒也當用補中益氣倍加白朮彼惑於衆論云白朮能潰膿乃專以散腫消毒為主而腫益甚體益倦余用白朮一味煎飲而消儒者楊啓元左臀患此敷貼涼藥腫徹內股服連翹消毒散左體皆痛余以為足三陰虧損用補中益氣湯以補脾肺用六味丸加五味以補肝腎股內消而臀間潰又用十全大補湯而瘡口斂一儒者腫焮痛甚此邪毒壅滯用活命飲隔蒜灸而消後因飲食勞倦腫痛仍作寒熱頭疼此元氣虛而未能復也與補中益氣湯頻用蔥尉法兩月而愈一男子漫腫而色不變脈滑數而無力膿將成矣余用托裡而欲針彼畏針而欲內消誤用攻伐之劑頓加惡寒發熱自汗等症余用十全大補湯數劑腫起色赤仍外針內補而愈昆庠吳輔之父患此內潰腫脹發熱口乾飲食少思此脾胃虛弱也先用六君加芎歸耆數劑而潰又用十全大補湯倍加參耆五十餘劑而愈南濠沈克章子年三十脈如屋漏雀啄腫硬色赤膿水清稀誤服敗毒之藥余曰此足三陰虧損而藥復傷也余用六君加歸耆附子一錢二劑腫潰色赤又減附子數劑元氣復而瘡愈一男子硬痛發熱此膀胱氣虛而濕熱壅滯用內托羌活湯二劑熱痛悉退後用托裡消毒散而潰又用托裡散四十餘劑而斂平湖袁上舍患痔外敷寒涼內服消毒攻潰於臀膿水清稀脈洪大而數寒熱作渴余辭不治後果歿此足三陰虧損之症失滋化源以致真氣益虛邪氣愈甚矣不死何俟論囊癰二謂陰囊患癰囊癰屬肝腎二經陰虛濕熱下注若小便澀滯者先分利以泄其毒繼補陰以令其自消若濕熱退而仍腫痛宜補陰托裡以速其膿膿焮而便祕者熱毒壅閉也先用托裡消毒散後用針以泄之膿去即解若膿去而腫痛不減者熱毒未解也用清肝養榮湯口乾而小便數者腎經虛熱也六味丸內熱晡熱者肝經血虛也四物加參術體倦食少者脾氣虛熱也補中益氣湯膿水清稀者氣血俱虛也十全大補湯此症雖大潰而睪丸懸露治得其法旬日肉漸生而愈若專攻其瘡陰道益虛則腫者不能潰潰者不能斂少壯者多成痼疾老弱者多致不起亦有患痔漏久而串及於囊者當兼治其痔切忌寒藥克伐虧損胃氣治驗給事陸貞山腫赤脹痛小便澀滯寒熱作渴此肝腎陰虛濕熱下注也當清肝火除濕毒遂用柴胡炒龍膽吳茱萸炒黃連當歸銀花皂角刺赤芍藥防風木通甘草節一劑腫痛漸退少加防風木通川芎茯苓作飲下滋腎丸以補陰其熱腫俱退但內有一條筋不消此肝經血虛氣損也當滋腎水用六味丸料去茯苓加五味二劑再用補中益氣加茯苓作飲送滋腎丸筋頓消而愈京兆朱二峰陰囊脹痛彼以為疝余診其脈數而滑此囊癰也因肝腎二經陰虛濕熱所致膿已成矣服活命飲一劑而潰更用補陰托裡而斂知州王汝道先晡熱發熱肢體倦怠入房則腿足痠軟足心熱至腿膝六脈洪數兩尺為甚余以足三陰虛欲滋補化源彼反服苦寒降火之劑後陰囊腫脹用治疝之藥腫脹益甚形氣愈虛服溫補之藥腫痛上攻小便不利兩尺脈洪滑按之虛甚余曰此囊癰也因氣血虛而不能潰也用補中益氣湯加山藥山茱萸車前子柴胡山梔一劑腫脹頓消隨用六味丸料加車前牛膝柴胡山梔一劑小便漸通乃用活命飲與前二藥消息兼用至二十餘劑囊裂出穢膿甚多乃用托裡消毒散六劑膿穢清又用托裡散數劑膿水漸少更用補陰托裡散及十全大補五十餘劑而痊儒者陳時用考試不利一夕飲燒酒入房妻不納翌日陰囊腫脹焮痛遣人求治余以除濕熱清肝火之劑城門夜閉不及歸服翌早報云夜來陰囊悉腐玉莖下面貼囊者亦腐此肝火挾酒毒而濕熱熾盛也仍以前藥加參耆歸術四劑腐肉盡脫睪丸懸掛用大補氣血並塗當歸膏囊莖全復而愈一膏粱之客陰囊腫脹小便不利此中焦積熱乘虛下注先用龍膽瀉肝湯加黃柏知母黃連牛膝四劑漸愈後用補陰八珍湯加柴胡山梔而愈後不守禁忌前症復作仍用補陰八珍湯補中益氣湯六味丸而痊又因勞發熱自用四物黃柏知母之類虛症悉具瘡口開大余謂五臟氣血俱虛也朝用補中益氣夕用六君子加當歸各五十餘劑瘡口漸斂又用六味丸調補全愈府庠李達卿素腎虛發熱久服黃柏知母之類形體漸瘦遺精白濁晡熱唾痰余曰此腎水虧損虛火內熾用補中益氣之類加麥門五味前症將愈又別用清熱涼血之劑飲食少思唾痰不止余以為脾肺復虛不能攝涎歸源仍用前湯加茯苓半夏而愈後入房頭暈吐痰腰骨作痛大小便道牽痛余曰此精已耗而復竭所致危殆之症也遂朝用前湯加麥門五味夕用六味丸料加五味子萆薢五十餘帖諸症頓退後又入房陰囊陰莖作痛別用淡滲之劑陰囊內潰余用補陰托裡之劑出膿甚多喜腫消痛止竟不善調養以致大便不通小便如淋痰涎上湧余曰腎虛之症復作矣誠為可慮有保其可生者用礞石滾痰丸牛黃清心丸之類吐痰愈加余曰非惟無以保其生而反促其危矣固辭不治後果歿一男子醉而入房陰囊腫脹大如斗小腹脹悶小水淋赤發熱口乾痰涎壅甚此膀胱陰虛酒毒所乘也用六味丸料加車前牛膝作飲下滋腎丸諸症頓退再加五味麥門二劑而愈卻以補中益氣加麥門五味調理而康若用淡滲復損真陽決致不起論懸癰三懸癰謂瘡生於玉莖之後穀道之前屬足三陰虧損之症輕則為漏瀝盡氣血而亡重則內潰而即殞若初起濕熱壅滯未成膿而作痛或小便澀滯用龍膽瀉肝湯腫焮痛甚仙方活命飲並以制甘草佐之如此雖患亦輕雖積亦淺若不能成膿或膿成不潰者八珍湯補之若膿已成者急針之若其生肌收斂腎虛六味地黃丸血虛者四物加參術氣虛者四君加芎歸脾虛者補中益氣湯氣血俱虛者八珍湯並十全大補湯若用寒涼消毒則誤矣治驗尚書鮑希傳足發熱服四物黃柏知母之類年餘患囊癰唾痰作渴飲湯其熱至膝更加芩連二陳熱痰益甚謂余曰何也余曰此足三陰虧損水泛為痰寒涼之劑傷胃而甚耳遂先用補中益氣夕用六味丸間佐以當歸補血湯半載乃愈趙州守患此症腫多作痛五月餘矣晡熱口乾盜汗食少體倦氣短脈浮數而無力此足三陰氣血虧損用補中益氣加制甘草麥門五味三十餘劑食進勢緩又用六味丸料五十餘劑膿潰瘡斂後因膿作痛少食脅痛發熱又用前藥賴其稟實慎疾而愈通府張敬之患前症久不愈日晡熱甚作渴煩喘或用四物湯黃柏知母之類前症益甚肢體倦少食大便不實小便頻數謂余曰何也余曰此脾虛之症前藥復傷而然余遂用補中益氣加茯苓半夏數劑飲食漸進前症漸愈更加麥門五味調理乃痊經云脾屬太陰為陰土而主生血故東垣先生云脾虛元氣下陷發熱煩渴肢體倦怠等症用補中益氣湯以升補陽氣而生陰血若誤認為腎虛輒用四物黃柏知母之類反傷脾胃生氣是虛其虛矣況黃柏知母乃瀉陽損陰之劑若非膀胱陽火盛而不能生陰水以致發熱者不可用也一儒者患此服坎離丸及四物黃柏知母之類不應脈浮洪按之細微余以為足三陰虛用托裡散及補陰托裡散漸愈又用六味丸補中益氣湯調補化源半載而痊大凡瘡瘍等症若腎經陽氣亢盛致陰水不能化生而患陰虛發熱者宜用坎離丸取其苦寒能瀉水中之火令陽氣衰而水自生若陽氣衰弱致陰水不能化生而患陰虛發熱者宜用六味丸取其酸溫能生火中之水使陽氣旺則陰自生況此症屬腎經精氣虧損而患者十有八九屬腎經陽氣亢盛而患者十無一二然江南之人患之多屬脾經陰血虧損元氣下陷須用補中益氣升補陽氣使陽生而陰長若嗜欲過多虧損真水者宜用六味丸補腎經元氣以生精血仍用補中益氣湯以培脾肺之生氣而滋腎水經云陰虛者脾虛也但多誤以為腎經火症用黃柏知母之類復傷脾肺絶其化源反致不起惜哉上舍劉克新潰後作痛發熱口乾小便赤澀自用清熱消毒之藥不應左尺洪數余以為陽氣盛而陰氣虛也先用四物湯加黃柏知母等諸劑瀉其陽氣使陰自生服數劑諸症漸愈後用補中益氣湯六味地黃丸補脾肺滋腎水而瘡口愈一儒者小便赤澀勞則足軟腫痛發熱口乾舌燥食少體倦日晡益甚此氣血虛而未能潰也遂用八珍加麥門山藥倍用制甘草數劑諸症悉退但患處腫痛此膿內焮也又五劑膿自湧出又五十餘劑而瘡口將完又因勞役且停藥寒熱作渴腫痛膿多用補中益氣湯加炒山梔二劑少愈又以八珍湯加麥門五味百餘劑腫痛悉去喜其慎起居節飲食常服補劑而安但勞則出膿一二滴後惑於他言內用降火外用追蝕必其收斂致患處大潰幾至不起仍補而愈論便癰四一名便毒一名痃痃便癰屬厥陰肝經內熱外寒或勞倦過度或房欲不節或欲心不遂或強固其精或肝經濕熱而致治法內熱外寒者雙解散勞倦過度者補中益氣湯房欲不節者六味丸料欲心不遂者先用五苓散加大黃疏其精滯後用地黃丸以補其肝腎強固其精或濕熱壅滯者宜用龍膽瀉肝湯疏肝導滯夫便癰血疝也屬厥陰肝經之絡脈衝任督脈之隧道故婦人患此多在兩拗腫痛或腹中結塊小便澀滯苟治者得法患者又能調攝何難斂之有若概用大黃等劑以求其內消或令膿隨便下損其氣血及不慎起居飲食者皆為不治治驗府庠沈尼文年二十左拗患之余以肝腎陰虛先用托裡藥潰而將愈因入房發熱作渴右邊亦作痛膿水清稀虛症悉至脈洪大而無力勢甚可畏用十全大補加附子一錢脈症頓退再劑全退後用大補湯三十劑而愈一儒者腫痛便澀用八正散二劑清肝火導濕熱而腫痛愈再以小柴胡加芎歸澤瀉山梔二劑清肝火補脾血而小便利一男子潰而腫痛不止此餘毒未解用活命飲一劑而痛止再劑而腫消一男子痛甚發熱用前飲一劑痛止再以神效栝蔞散加山梔柴胡二劑而消一男子腫而不潰余謂此因陽氣虛弱用參耆歸術以補托元氣用白芷皂角刺柴胡甘草節以排膿清肝數劑而潰以八珍加柴胡補其氣血數劑而愈一男子已潰而痛不止小便祕澀此肝火未解也與小柴胡湯加黃柏知母芎歸痛止便利更以托裡當歸湯而瘡斂若毒未解而痛不止者須用活命飲一婦人素清苦因鬱怒患前症或用敗毒寒涼之藥反晡熱內熱自汗盜汗月經不行口乾咽燥余謂此鬱氣傷脾因藥復損先以當歸湯數劑後兼逍遙散各五十餘劑而諸症皆愈一婦人小腹內如有所梗兩拗並人門俱腫小便淋澀經候不調內熱不渴飲食少思腹內初如雞卵而漸大脈洪數而虛左關尤甚屬肝脾鬱結之症也用加味歸脾湯肝火退而脾土健間以逍遙散下蘆薈丸而愈一婦人兩拗腫痛腹內一塊不時上攻月經不調小便不利余以為肝脾氣滯以四君加芎歸柴胡山梔而愈後因鬱怒前症復作卻兼胸脅脹滿盜汗此肝木甚而傷脾土用加味歸脾湯下蘆薈丸而愈一婦人小腹內或作痛或痞悶兩拗腫痛內熱寒熱胸膈不利飲食不甘形體日瘦此肝氣滯而傷脾氣朝用補中益氣湯夕用六味丸漸愈更用蘆薈丸而痊愈一婦人兩拗腫痛小腹痞脹小便時數白帶時下寒熱往來小水淋瀝余謂脾氣滯而血病用龍膽瀉肝湯漸愈又用加味逍遙散六味丸而痊愈一婦人患前症胸脅脹悶或小便不利或時作痛小便澀滯服疏氣豁痰等藥益甚余謂肝火氣分之病用龍膽瀉肝湯以清肝熱又用加味逍遙散以生肝血六味丸以滋腎水而愈一婦人患前症余謂此肝脾鬱怒之症不信別服化痰利氣之劑胸腹脹悶又服峻利疏導之劑變脾虛發腫之症而歿一婦人兩拗腫痛內熱作渴飲食不甘肢體倦怠陰中作梗小便赤澀為肝脾陰虛濕熱用加味歸脾湯而愈後因怒復作小腹腫脹小便不利用小柴胡加山梔芎歸以清理肝火脹痛頓止又以加味逍遙散調補肝火而痊一婦人兩拗作痛寒熱內熱小便赤澀胸脅不利此肝火動而脾氣傷用補中益氣湯加茯苓數劑少愈又與加味歸脾湯諸症悉退再用加味逍遙散而痊愈一婦人小腹痞悶小便不利內熱體倦懶食此氣血虛而兼肝火用八珍湯加柴梔膽草治之而安一婦人陰中如梗兩拗腫痛寒熱不食小便頻數小腹重墜余以為肝脾鬱結所致先以補中益氣湯加山梔茯苓車前子青皮以清肝火升脾氣更以加味歸脾湯二十餘劑調理脾鬱而愈論下疳瘡五婦人陰瘡等症見女科撮要婦人良方下疳屬肝經濕熱下注或陰虛火燥治法腫痛發熱者血虛而有熱也四物湯加柴胡山梔腫痛寒熱者肝經濕熱也小柴胡湯加龍膽草黃連腫痛便澀者濕熱壅滯也龍膽瀉肝湯腫痛腐潰者氣血虛而有火也八物湯加山梔柴胡日晡熱甚者陰血虛而有熱也小柴胡湯加參朮芎歸日晡倦怠者陽氣虛而下陷也補中益氣湯其經久不愈而發寒熱者腎水不能生肝木也用六味丸若筋縮縱或為癢痛或出白津此筋疝也用龍膽瀉肝湯氣虛者補中益氣加炒山梔炒龍膽陰虛火燥者用六味丸莖中癢出白津用補中益氣湯與清心蓮子飲間服蓋此症肝經陰虛為本腫痛寒熱等症為標須用六味丸以生肝血凡脾土虛不能生金水而見一切肝症者當佐以補中益氣湯加麥門冬以滋化源治驗庶給士劉華甫或莖中作痛或竅出白津或小便祕澀先用小柴胡湯加山梔澤瀉黃連木通膽草茯苓二劑以清肝火導濕熱諸症漸愈後因勞倦忽然寒熱此元氣復傷也用補中益氣而安又用六味丸以生肝血滋腎水而痊愈州守姜節甫患前症膿水淋漓作渴吐痰午前惡寒午後發熱余曰午前惡寒屬陽氣虛弱午後發熱屬陰血不足不信反服二陳黃柏知母之類飲食益少大便不實又日晡熱渴小腹重墜患處焮痛恪用四物黃柏知母之類飲食亦不思余以脾氣虛而下陷先用補中益氣湯調養脾胃以升陽氣諸症漸愈又用六味丸滋補腎水以生肝血而痊一小兒十五歲患前症雜用消毒之藥虛症悉具二年餘矣詢之乃稟所致用萆薢湯月餘諸症漸愈又用補陰八珍補中益氣二湯而痊一儒者莖中作癢發熱倦怠外皮浮腫二年矣用八珍加柴胡山梔及六味地黃丸而愈有兼陰毛間生蟲作癢者用桃仁研爛塗之一儒者因勞而患焮痛寒熱體倦頭疼小便赤澀用補中益氣湯加車前牛膝山梔而愈一儒者陰莖腐爛腫痛不止日晡熱甚口乾體倦食少欲嘔此肝脾血虛也先用六君子加柴胡升麻脾胃醒而諸症退更以補中益氣加炒山梔肝火退而腫痛痊論痔瘡六男婦同治痔屬肝脾腎三經故陰精虧損者難治多成漏症若肺與大腸二經風熱濕熱者熱退自愈不守禁忌者亦成漏症或因醉飽入房筋脈橫解精氣脫泄熱毒乘虛流注或淫極強固其精以致木乘火勢而侮金或炙爆厚味或勞傷元氣陰虛火熾所致初起焮痛便祕或小便不利者宜清熱涼血潤燥疏風若氣血虛而寒涼傷損者調養脾胃滋補陰精若破而久不愈多成痔漏有穿臀穿腸穿陰者其腸頭腫塊者濕熱也作痛者風熱也便結者火燥也潰膿者熱勝血也大便作痛者潤燥除濕肛門墜痛者瀉火除濕小便澀滯者清肝導濕其成漏者養元氣補陰精為主經云因而飽食筋脈橫解腸澼為痔其屬在肝與脾腎也明矣若有患痔而兼疝患疝而兼下疳皆屬肝腎不足之變症但用地黃丸益氣湯以滋化源為善若專服寒涼治火者無不致禍治驗進士周希輔素有疝痔勞則小腹作痛莖出白津痔亦腫痛若飲食勞倦起居失宜則發寒內熱肢體疲倦服十全大補湯諸症並退彼欲去病根乃用攻病生肌之藥肌體骨立余用益氣湯地黃丸元氣漸復但自弛調攝不能痊愈一儒者膿血淋漓口乾作渴晡熱便血自汗盜汗余謂此腎肝陰虛也不信仍服四物柏知連之類食少瀉嘔余先用補中益氣湯加茯苓半夏炮姜脾胃漸醒後用六味丸朝夕服兩月餘諸症悉愈儒者楊舉元素陰虛勞則肢體倦怠兩足發熱服清熱等劑熱至腰膝大便澀滯飲食過多則瀉至年餘作渴吐痰患痔出膿仍不節勞則忽惡寒發熱復患癰膿水不止氣血虛甚余用六味丸補中益氣湯滋養化源喜其慎疾年餘而痊一男子患此服寒涼之劑侵晨去後不實食少體倦口乾作渴小腹重墜余用補中益氣湯而下墜頓止用四神丸而食進便實用地黃丸而瘡尋愈一膏粱酒色之人患之作痛服苦寒之藥致臀腫硬又加大黃腹脹頭痛此足三陰虧損而藥復傷余用補中益氣湯升補陽氣加參苓半夏木香以助脾氣數劑而愈上舍陸子藩時仲冬患痔作痛右手浮大左尺洪數余曰冬見夏脈當壯水之主以鎮陽光彼以為迂別服芩連之劑越明年六月九日復邀視之痰涎上湧日夜不寐脈洪大而數按之無力左尺全無足手肩膊逆冷余曰事急矣彼云但求少延數日以待嗣子一見耳勉用參耆歸朮炮姜之類及六味丸料加肉桂至本月丁酉日果歿五行之理信然侍御王兩間長子患痔作渴發熱尺脈洪數按之無力余曰此肝腎陰精虧損而虛火妄動當滋化源彼不信後吐痰聲嘶面赤體瘦而歿論便血七婦人症見女科撮要經云邪在五臟則陰脈不和陰脈不和則血留之陰氣內結陽絡外傷滲入腸間故便血也針經云陽絡傷則血外溢而衄血陰絡傷則血內溢而便血皆因飲食失節而起居不時七情六淫失宜內傷外感所致若外感則血鮮名腸風內傷則血濁名臟毒外感而元氣實者人參敗毒散加槐花荊芥以祛邪氣內傷而元氣虛者亦用六君子湯以補胃氣元氣下陷者補中益氣湯以升舉之憂思傷脾者濟生歸脾湯以解之糞前見血者益氣湯加吳茱萸糞後見血者加黃連陰血不足者宜用四物湯病因多端不能盡述當臨症制宜庶無誤矣丹溪先生云精氣血氣出於穀氣惟大便下血當以胃氣收功治者審之治驗一儒者素善飲不時便血或在糞前或在糞後食少體倦面色痿黃此脾氣弱虛而不能統血以補中益氣湯加吳茱萸黃連三十餘劑而再不發一男子每怒必便血或吐血即服犀角地黃湯之類余曰此脾虛不能攝血恐不宜用此寒涼之藥彼不信仍服之日加倦怠面色痿黃更用四物芩連丹皮之劑飲食少思心煩渴熱吐血如湧竟至不起若用四君芎歸補中益氣湯多有得生者論脫肛八男婦同治脫肛屬大腸氣血虛而兼濕熱有久痢氣血俱虛而脫者有因腎虛而脫者有中氣虛而脫者有因腎虛而脫者濕熱者升陽除濕湯血熱者四物加條芩槐花血虛者四物加白朮茯苓兼痔而痛者四物加槐花黃連升麻久痢者補中益氣湯加酒炒芍藥中氣虛陷者前湯加半夏炮薑茯苓五味腎虛者六味丸虛寒者八味丸肺與大腸為表裡肛者大腸之門肺實熱則祕結肺虛寒則脫出腎主大便故腎虛者多患此症治驗舉人於時正素有痔每勞役便脫肛腫痛出水中氣下陷也用補中益氣湯加茯苓芍藥十餘劑中氣復而即愈後復脫作痛誤服大黃丸腹鳴惡食幾危余用前湯加炮薑芍藥諸症漸愈後去姜加熟地五味三十餘劑而愈一男子脾胃素弱或因勞倦或因入房肛門即下腫悶痛甚用補中益氣湯加麥門五味兼六味丸而愈後因過飲下墜腫痛誤用降火消毒虛症蜂起余用前湯加炮薑木香一劑再用前湯並加減八味丸兩月而安一儒者面白神勞素畏風寒飲食喜熱稍多必吞酸作瀉吸氣覺冷便血盜汗余以為脾腎虛寒用補中益氣加炮薑肉桂五十餘劑八味丸斤許諸症悉愈論腎臟風瘡九男婦同治腎臟風屬腎虛風邪乘於臁脛以致皮膚如癬或漸延上腿久則延及遍身外症則搔癢成瘡膿水淋漓眼目昏花內症則口燥舌乾腰腿倦怠吐痰發熱盜汗體疲治法用六味丸為主佐以四生散若脾胃虛弱者用補中益氣為主佐以六味丸四生散為善治驗欽天薛循齊六十有一兩臁患之膿水淋漓發熱吐痰四年矣此腎臟風症也與六味丸四生散而瘥年餘復作延及遍身日晡益甚痰渴盜汗唇舌生瘡兩目昏赤皆腎經虛火而水泛為痰用加減八味丸而愈三年後小便淋漓莖中澀痛此思色精不出而內敗也用前丸及補中益氣湯加麥門五味而愈論臁瘡十婦人症見女科撮要婦人良方臁瘡生於兩臁初起赤腫久而腐潰或津淫搔癢破而膿水淋漓蓋因飲食起居虧損肝腎或因陰火下流外邪相搏而致外臁屬足三陽濕熱可治內臁屬足三陰虛熱難治若初起惡寒壯熱腫焮作痛者屬濕熱用檳蘇敗毒散若漫腫作痛或不腫不痛者屬陰虛用補陰八珍湯若膿水淋漓體倦食少內熱口乾者屬脾虛用補中益氣加茯苓酒炒白芍藥若午後熱或作痛頭目不清者屬陰火前湯加酒炒黑黃柏及六味地黃丸若午後發熱至子時分方止是血虛前湯加芎歸熟地若鬱結傷脾而甚用歸脾湯加柴胡山梔若怒動肝火而甚用補中益氣湯加川芎山梔黃芩內熱口乾肢體倦怠或痰涎上升或口舌生瘡屬脾腎虛熱用六味地黃丸補中益氣湯若患處黑黯肢體畏寒飲食少思屬脾腎虛敗用八味地黃丸若誤用攻伐復損胃氣絶其化源治亦難矣治驗鴻臚翟少溪兩臁生瘡漸至遍身發熱吐痰口燥咽乾盜汗心煩溺赤足熱日晡益甚形體日瘦此腎經虛火也用六味丸一月諸症悉退三月元氣平復一男子左腿腫肉色如故寒熱噁心飲食少思此脾氣不足而為外邪所感也用六君加藿香桔梗川芎而寒熱止又用補中益氣湯而腫痛消陳湖陸懋誠素因陰虛過飲入房發熱腿痛似臁瘡用發表之劑兩腿腫黯熱氣如霧欲發痙脈皆洪數兩尺尤大余曰屬足三陰虛酒濕所乘元氣損而邪益甚耳用十全大補加山藥山茱萸附子一劑脈症頓退卻去附子又二劑痊愈一男子先於兩臁後及遍身生瘡似疥非疥時或膿水淋漓兩腿為甚肢體倦怠作癢煩熱年餘不愈余作腎經虛火用加減八味丸而愈一男子腿患癰服克伐之藥虧損元氣不能成膿余為托裡而潰大補而斂但大便結燥用十全大補湯加麥門五味而潤月餘仍結自服潤腸丸而瀉不止余用補中益氣湯送四神丸數服而愈論足跟瘡十一婦人症詳見婦人良方足跟乃督脈發源之所腎經所過之地若飲食失節起居失宜虧損足三陽經則成瘡矣若漫腫寒熱或體倦少食屬脾虛下陷也用補中益氣湯若晡熱作痛頭目不清屬脾虛陰火也前湯並六味丸若痰涎上升口舌生瘡屬腎水乾涸也前湯並加減八味丸凡此皆當滋其化源若治其外則誤矣俗云兔齧瘡者蓋獵人被兔咬足跟久而不斂氣血瀝盡而死治驗大尹陳汝鄰兩腿痠軟或赤或白足跟患腫或痛或癢後痛而或如無皮或如皺裂日晡至夜脹痛焮熱用補中益氣湯加八味丸料補其肝腎而愈一男子足跟作痛熱渴體倦小便如淋誤用敗毒散致頭痛惡寒欲嘔不食吐痰咳嗽此足三陰虧損而藥復傷余用十全大補湯加減八味丸各五十餘劑而愈一男子素不慎起居內熱引飲作渴體倦兩足發熱後足跟作痛或用清熱除濕之劑更加發腫又服敗毒之藥焮赤痛甚恪用祛毒清熱潰裂番張狀如赤榴熱痛如錐內熱晡熱此因足三陰虧損朝用十全大補湯夕用加減八味丸外敷當歸膏兩月餘而愈其服消毒等藥而歿者不能枚舉一男子亦患此服消毒散搽追蝕藥虛症疊出其形體骨立自分必死余用十全大補兼山茱山藥兩月餘而愈一膏粱之人兩腳發熱作渴左尺脈數而無力余謂此足三陰虧損防患疽不信反服清熱化痰之藥更加晡熱頭暈又服四物黃柏知母日晡熱甚飲食漸少面部見發疽余用補中益氣六味地黃丸百餘服而其不信患疽以致不起者多矣一婦人勞則足跟熱痛余以為三陰虛用八珍湯而痊後遍身搔癢誤服風藥發熱抽搐肝脈洪數此肝家血虛火盛而生風以天竺膽星為丸用四物麥門五味芩連炙草山梔柴胡煎湯送下而愈一婦人兩足發熱兩跟作痛日晡熱甚余以為肝腎血虛用加味逍遙散六味地黃丸五十餘劑諸症悉愈一婦人素血虛因大勞兩足發熱晡熱月經過期或用四物黃連飲食少思胸痞吐痰用二陳枳實黃連大便不實吐痰無度足跟作痛余曰足熱晡熱月經過期乃肝脾血虛也胸痞吐痰飲食少思脾胃虛也蓋胃為五臟之根本胃氣一虛諸症悉至先用補中益氣湯加白茯苓半夏脾胃漸健乃佐以六味地黃丸以補脾腎不兩月而痊一婦人經候不調發熱晡熱胸膈不利飲食少思服清熱寬中消導之劑前症益甚更兼肢體痠痛服除濕化痰等藥經候兩月一至服通經降火等劑兩足跟趾作痛其熱如炙余以為足三陰虧損用補中益氣六味地黃丸兩月諸症漸退又用前湯並八珍散兩月而康一婦人足跟患腫兩腿痠軟或赤或白或癢或痛後或如無皮或如皺裂日晡至夜脹痛焮熱此足三陰虧損用加減八味丸及逍遙散加熟地川芎百餘劑而愈論腳發十二男婦同治腳發之症屬足三陰經精血虧損或足三陽經濕熱下注若色赤腫痛而潰膿者屬濕熱下注為可治若色微赤微腫而膿清者屬精血虧損為難治若黑黯不腫痛不潰膿煩熱作渴小便淋漓者陰敗未傳惡症也為不治其法濕熱下注者先用隔蒜灸活命飲以解壅毒次服益氣湯六味丸以補精氣若色黯不痛者著肉灸桑枝灸以行壅滯助陽氣更用十全大補湯八味丸壯脾胃滋化源多有復生者若專治其瘡復傷生氣吾未見其生者治驗閣老靳介庵腳趾縫作癢出水腫焮腳面敷止癢之藥不應服除濕之劑益甚余以為陰虛濕熱下注用六味地黃丸補中益氣湯而愈大參李北溪左腳赤腫作痛此足三陽經濕熱下注先用隔蒜灸活命飲一劑其痛頓止灸患處出水赤腫頓消次用托裡消毒散四劑灸患處出膿而愈儒者楊舉元患此微腫痛微赤焮此足三陰經陰虛濕熱下注用隔蒜灸托裡散而起發用十全大補湯而膿成又與加減八味丸百劑而斂一儒者患此腫硬色白兩月餘矣此足三陰經虧損為外寒所侵用大防風湯及十全大補兼服而消後場屋不利飲食勞倦前症復作盜汗內熱飲食不化便滑肌瘦此脾土虛寒而命門火不能相生用八味丸益氣湯百餘劑喜其年壯得愈一男子腳心發熱作渴引飲或用四物連柏芩知母之類腹痛作嘔煩熱大渴此足三陰虧損前藥復傷脾胃也先用六君加炮姜數劑而脾胃醒再用補中益氣加茯苓半夏而脾胃健乃以加減八味丸兼服半載而愈一儒者腳心發熱作癢以滾湯浸潰潰而出水肌體骨立作渴吐痰此脾腎虛而水泛為痰也服益氣湯六味丸年餘元氣復而諸症愈少宗伯顧東江面黧作渴余曰此腎經虧損當滋化源以杜後患彼雖然之而終不服次年九月內左足面患疽色黯不痛腳腿沉重用隔蒜灸三十餘壯足腿即輕瘡出血水數日而消瘡色仍黯時公將北行賀萬壽余診之曰脾脈衰憊陽氣虛極不宜遠行公曰余得夢屢驗向夢群仙待我此壽徵也至河間驛聚仙堂病篤嘆曰立齊豈能留我果卒於此亦異數也論脫疽十三脫疽謂疔患於足或足趾重者潰脫故名之亦有患於手患於指者因醇酒炙爆膏粱傷脾或房勞損腎故有先渴而後患者有先患而後渴者若色赤作痛自潰者可治色黑不潰者不治色赤作痛者元氣虛而濕毒壅盛也先用隔蒜灸活命飲托裡散再用十全大補湯加減八味丸色黯不痛者腎氣敗而虛火盛也隔蒜灸桑枝灸亦用十全大補湯加減八味丸則毒氣不致上侵元氣不致虧損庶可保生亦有因修手足口咬等傷而致者若元氣虛弱或犯房事外塗寒涼內服克伐損傷脾胃患處不潰若黑黯上延亦多致死重者須當以腳刀轉解周骨界輕拽去之則筋隨骨出而毒則泄亦不痛否則毒筋內斷雖去而仍潰且偏僻之處氣血罕到藥雖導達況攻毒之劑先傷脾胃不若灸法為良重者須解去為善故孫真人云在肉則割在指則截蓋親之遺體雖不忍傷而遂至夭歿則尤傷矣況解法無痛患者知之治驗一男子足趾患之腫焮痛赤此三陽經虛而外邪所乘也用隔蒜灸人參敗毒散加銀花白芷大黃二劑而痛甚又二劑而痛止又與十宣散加天花粉金銀花去桂數劑而愈又有足趾患之者色紫不痛此三陽經熱毒壅滯隔蒜灸五十餘壯又明灸百壯始痛投活命飲四劑更以托裡藥潰脫而愈一男子患前症赤痛作渴此足三陰虛而火內動用隔蒜灸活命飲三劑而潰更服托裡藥及加減八味丸潰脫而愈若早用前法不至於此一男子腫痛色赤發熱作渴大小便祕結其脈浮數按之沉實此足三陽經積熱內外俱受患也先用隔蒜灸及人參敗毒散加銀花白芷大黃而潰更以活命飲而痊一膏粱之人先作渴足熱後足大趾赤痛六脈洪數而無力左尺為甚余以為此足三陰虛當滋化源為主因服除濕敗毒等劑元氣益虛色黯延足余乃朝用補中益氣湯夕用補陰八珍湯各三十餘劑及桑枝灸潰而膿清作渴不止遂朝以前湯送加減八味丸夕用十餘大補湯三十餘劑而痊是時同患此症服敗毒之藥者俱不救論瘤贅十四附結核凡結核當與瘰癧參看內經云肝統筋而藏血心裡血而主脈脾主肉而統血肺主氣而司腠理腎統骨而主水若怒動肝火血涸而筋攣者其自筋腫起按之如筋久而或有赤縷名曰筋瘤用六味地黃丸四物山梔木瓜之類若勞役火動陰血沸騰外邪所搏而為腫者其自肌肉腫起久而有赤縷或皮俱赤名曰血瘤用四物茯苓遠志之類若鬱結傷脾肌肉消薄外邪所搏而為腫者其自肌肉腫起按之實軟名曰肉瘤用歸脾益氣二湯若勞傷肺氣腠理不密外邪所搏而壅腫者其自皮膚腫起按之浮軟名曰氣瘤用補中益氣之類若勞傷腎水不能榮骨而為腫者其自骨腫起按之堅硬名曰骨瘤用地黃丸及補中益氣湯主之夫瘤者留也隨氣凝滯皆因臟腑受傷氣血乖違當求其屬而治其本大凡屬肝膽二經結核八珍加山梔膽草以養氣血清肝火六味丸以養肺金生腎水若屬肝火血燥須生血涼血用四物生地丹皮酒炒黑膽草山梔中氣虛者補中益氣兼服若治失其法脾胃虧損營氣虛弱不能濡於患處或寒氣凝於瘡口榮氣不能滋養於患處以致久不生肌而成漏者悉調補脾胃則氣血壯而肌肉自生矣若不慎起居及七情六淫或用寒涼蝕藥蛛絲纏芫花線等法以治其外則誤矣治驗長州庠王天爵辛丑春左腿近環跳患之狀如大桃按之濡軟恪服除濕流氣化痰之劑惡寒發熱食少體倦形氣俱虛脈洪大而虛氣瘤也肺主之蓋膽屬木肺屬金然發於膽經部分乃肺金侮肝木元氣虧損而其膿已內潰矣遂用十全大補湯數劑出青白稀膿甚多頓加寒熱煩渴頭痛殊類傷寒狀余謂此因膿泄而血氣益虛耳仍用前湯其勢益甚脈洪數大按之如無乃加附子一錢其勢愈甚而脈復如前此虛甚而藥未能及也更加附子二錢三劑諸症頓退乃朝用補中益氣湯夕用十全大補湯各三十餘劑出腐骨五塊瘡口將完後因不慎起居患處復潰諸症更發咽間如焚口舌無皮用十全大補加附子一錢服之諸症痊二日不服內病悉至患處復潰二年後又患服前藥不應診其尺脈微細如絲此屬命門火衰用七味丸為主佐以十全大補湯稍愈至乙巳仍患虛寒之症而歿一男子左腿外側近臀腫一塊上有赤縷三年矣飲食起居如常觸破湧出血膿發熱惡寒此膽經受症故發於腿外側診其脈左尺洪數左關弦洪此腎水不能生肝木用補中益氣湯六味地黃丸而痊一男子小腹患之膿水淋漓此足三陰之症用補中益氣加麥門五味以培脾土用六味地黃丸以生腎水更用蘆薈丸以清肝火而斂一老儒眉間患之二年其狀如紫桃下墜蓋目按之如水囊此肝脾之症膿瘀內潰而然耳遂刺出血膿目即開以炒黑膽草山梔芎歸芍藥柴胡白朮茯苓等類而愈舉人江節夫兩耳下兩臂兩肋結核恪服祛痰降火軟堅之劑益甚余曰此膽經血虛火燥也蓋膽經行人之側前藥必致虧損至明年七月復請視各核皆潰脈浮大而澀時金旺於秋木受金克必不治果卒嘉善周上舍兩耳下項間筋攣壅腫堅硬咳嗽氣喘內熱盜汗所服皆化痰散堅行氣之劑勢益甚余診之左關弦澀左尺洪數此怒氣傷肝房勞損腎須滋腎水生肝血慎調攝至水旺之際庶可愈矣彼欲速效乃外敷商陸石灰等藥內服海藻莪朮之類至秋金旺之際元氣愈虛其腫愈甚而歿鎮江孫上舍缺盆間腫如覆甌堅硬色赤內熱晡熱自汗盜汗就治於余曰賤疾皆以散堅行氣降火破血之劑欲其內消而反甚其脈左尺洪數按之而弱左關洪數按之而澀此怒氣傷肝血涸而筋攣也因其急於仕進余辭不能治彼亦不信後果歿此症若補脾肺滋肝腎則木得水而敷華筋得血而滋潤多有得生者論疣子十五疣屬肝膽少陽經風熱血燥或怒動肝火或肝客淫氣所致蓋肝熱水涸腎氣不榮故精亡而筋攣也宜以地黃丸滋腎水以生肝血為善若用蛛絲纏螳螂蝕耆艾灸必多致誤大抵此症與血燥結核相同故外用腐蝕等法內服燥血消毒則精血愈虛肝筋受傷瘡口翻突開張卒成敗症治驗府庠朱宏仁年二十右手背近中指患五疣中一大者如黃豆余皆如聚黍拔之如絲長三四寸許此血燥筋縮用清肝益榮湯五十餘劑而愈府庠沈嫗文幼齧指甲及長不能自禁余曰此肝火血燥也又頸側常生小疣子屢散屢發又臂生一塊如緑豆大若觸碎如斷束縷扯之則長縮之則縮後兩鬢髮白點求治余曰子素肝病此病亦屬肝膽經也夫爪為筋之餘膽行人生之側正與齧爪生㾋等症相應須滋補腎水以生肝膽則諸病自愈矣乃與六味地黃丸服之二年白點自退疣亦不生一男子臉患疣初如赤椹雜用敷貼之藥翻張如菌又用腐蝕焮大如瘤此足三陰經虛證悉具治以補脾肺生肝腎等劑而尋愈一男子小腹中一塊不時攻痛或用行氣化痰等藥不應尤以為血鱉服行氣逐血之劑後手背結一㾋子漸長寸許形如鱉狀肢節間如豆大者甚多彼泥鱉生子發於外亦用行血虛症悉至左尺洪數關洪數弦余以為腎水不能生肝木以致肝火血燥而筋攣用六味地黃丸生腎水滋肝血三月餘諸症悉愈一男子因勞役過度面色青黑發熱咳嗽面生疣子腹內一塊攻上攻下作痛小便祕澀服消克之藥愈甚察其脈左右關俱弦洪元氣弱甚此肝脾受病而筋攣也投以加味逍遙散合地黃丸料元氣遂復若誤以為血鱉之類消之必致不起一男子素膏粱醇酒先便血便結驚悸少寐後肛門周生小顆如疣子如鼠乳大小不一用清熱消毒等藥半載之間腿內股亦然又用化痰之藥寒熱吐痰頸間俱作肝腎脈浮數按之而弱余以為足三陰經血虛火熾法當滋化源彼不信別服四物黃柏知母之類諸症蜂起此胃氣復傷各經俱病也可先用補中益氣湯三十餘劑諸症漸愈乃朝用前湯夕用八珍湯又各五十餘劑諸症尋愈於是夕改用六味丸加五味子又半載諸症悉愈一婦人左手背並次指患五六枚如熟椹內熱晡熱月經素不按期余曰此因肝脾血虛而有熱也當調補二經使陰血生而他症自愈不信乃用艾灸手腫脹發熱手指皆攣兩脅項及胸乳間皆患疣經行無期余用加味逍遙散少加炒黑黃連數劑漸愈乃去黃連更佐以歸脾湯各患漸愈又百餘劑經行如期再用地黃丸三料而痊一婦人小腹內一塊或時上攻或時下墜寒熱胸痞小便淋漓或用行氣化痰等劑前症愈甚月經兩月餘而一行或以為內有肉鱉啖飲其血而經不行服驅逐之劑下血甚多兩手背結一疣如大豆許兩月漸長寸許又兩月餘又患數枚疑以鱉子行於外仍行驅逐兩耳下各患腫又疑為瘡毒余曰此屬肝火血燥也用加味逍遙散加味歸脾二藥兼服佐以六味丸三月餘而愈一婦人患之用蛛絲纏芫花線螳螂啖毒藥蝕著艾灸大潰腫痛發熱出血余曰此陰血虛也不信仍服降火之藥而歿論發痙十六痙當作痓瘡瘍發痙因氣血虧損外邪所搏或由虛鬱火所致其形牙關緊急四肢徑強或腰背反張肢體抽搐其有汗而不惡寒者曰柔痙風能散氣故有汗也其無汗而惡寒者曰剛痙寒能澀血故無汗也皆由亡血過多筋無所養故傷寒汗下過多與潰瘍産後多患之乃敗症也若大補氣血多有復生者若作風治速其危矣治驗秋官張同野舊有流注因暴寒睡炕口目抽搐手足戰掉余以為氣血虛熱而然用參耆歸朮川芎山梔柴胡半夏天麻炙草治之而愈吳給事贍之墜馬傷首出血過多發熱煩躁肉瞤筋惕或作破傷風欲發汗祛風余曰此亡血火動也無風可祛無汗可發當峻補其血用聖愈湯二劑頓愈又用健脾胃養氣血而痊愈一儒者背瘡將愈發熱煩躁自用降火之劑項強口噤自汗惡寒此汗多內亡津血筋無所榮也用補氣血之劑及地黃丸而愈一男子素勤苦早行遍身發疙瘩口噤目直脈弦緊此勞傷氣血內熱外邪所搏也用補中益氣加山梔羌活川芎而瘥半載後遍身作癢搔破成瘡發熱作渴脈洪大而虛復以前湯加芍藥麥門熟地天麻而愈一儒者善怒患瘰癧復因大怒跳躍忽仆地兩臂抽搐唇口喎斜左目緊小此肝火血虛內熱生風用八珍湯加牡丹皮鉤藤山梔而愈次年春前病復作兼小便自遺左關弦洪而數余以為肝火血燥用六味丸加鉤藤五味麥門芎歸治之漸愈又用補中益氣加山梔鉤藤牡丹皮而安一癧婦因怒仆地瘡口出血語言蹇澀口眼喎斜四肢拘急汗出遺尿或用驅風之劑六脈洪大肝脈尤甚此肝火熾甚也用加味逍遙散加鉤藤及六味丸尋愈一婦人患內痔因勞出血甚多不時發痙飲食少思形體倦怠其面色白余謂此氣傷而不能統血也用補中益氣湯反寒熱出血此陽氣虛寒也仍以前湯加炮姜四劑寒熱漸止飲食漸進又四劑而血頓止後因勞役或怒氣即便血或發痙投以補中益氣湯加鉤藤而愈一婦人素性急患遍身瘙癢或項間結核常服搜風順氣之劑後大怒吐血唇口牽緊小便頻數或時自遺此怒動肝火而血妄行也用小柴胡湯加山梔牡丹皮而愈一癧婦因勞兼怒四肢攣屈煩痛自汗小便短少畏見風寒脈浮弦緩此氣血虛而風寒濕熱相搏也先用東垣清燥湯漸愈再用加味逍遙散及八珍湯加牡丹皮而痊一婦人素有肝火兩拗間或腫痛或寒熱忽然昏憒瘛瘲抽搐善伸數缺四肢筋攣痰涎上升此肺金燥甚而血液衰少也用清燥丸六味丸兼服尋愈一婦人因大勞患臁瘡發疙瘩搔碎成瘡日晡熱甚或口噤發搐或頭目眩暈此肝脾氣血虛而內熱以八珍散加柴胡山梔治之諸症稍愈復因怒前症復作經行不止此肝脾血熱用加味逍遙散漸愈又用八珍散加柴胡山梔而痊一婦人發疙瘩日晡熱甚月經先期或頭目昏眩或寒熱發熱或四肢抽搐此肝經風熱血燥用加味逍遙散治之尋愈後因怒前症復作口噤遺尿此肝火血燥也用加味小柴胡湯治之漸愈又夜間發熱譫語此血分有熱也用小柴胡湯加生地而愈更用加味逍遙散調理而安一婦人患繭唇月經先期余以為肝火血熱不信乃泛用降火之劑反致月經過期復因勞怒口噤呻吟肢體不隨六脈洪大面目赤色用八珍麥門五味山梔丹皮數劑漸愈兼用逍遙散六味丸料各三十餘劑痊愈一婦人經行遇怒其經即止甚則口噤筋攣鼻衄頭痛痰湧搐搦瞳子上視此肝火熾甚以小柴胡湯加熟地黃山梔鉤藤鉤而愈一婦人素陰虛患遍身瘙癢誤服祛風之藥口噤抽搐肝脈洪數余曰肝血為陰為水肝氣為陽為火此乃肝經血熱火盛耳宜助陰血抑肝火遂用四物麥門五味柴胡山梔生草熱搐頓止又以八珍加黃耆麥門五味鉤藤鉤炙草調理而愈一婦人久患流注脾胃虛弱忽痰壅氣喘頭搖目札手揚足擲難以候脈視其面黃中見青此肝木乘脾士也用六君加柴胡升麻治之而蘇更以補中益氣加半夏茯苓而安論類破傷風症十七大凡癰疽潰後筋糜肉爛膿血大泄陽隨陰散或筋脈拘急惡寒惕搦甚者舌強口噤項背反張痰涎壅甚便閉汗出不時發熱此氣血俱虛而傳變雖與破傷風相類而主治之法當大補氣血若果系風症亦須以大補氣血為本而兼以治風之藥設若不審是非而妄藥之則誤矣風症治見後方治驗司徒邊華泉肩患癰潰而發熱目直或瞤殊類中風日晡熱甚脈益數此足三陰氣血虧損虛火妄動用參耆歸朮炙草加酒炒黑黃柏五味麥門肉桂四劑而愈又數劑而斂陸大行背瘡內潰出膿二碗許用托裡之劑痛止腫消停藥忽寒熱作渴頭痛自汗此元氣虛而未能復也用十全大補加麥門五味肉桂二劑益甚診其脈如故此藥力未及仍用前藥加附子一錢三劑諸症悉愈乃去附子加肉桂數劑而斂一儒者患腿癰深蓄於內肉色不變久不穿潰針出膿瘀五碗許惡症駢臻全類中風此脾胃虛而變症也用六君子加當歸炮姜及聖愈湯各四劑而安又勞心不寐用歸脾湯而愈一儒者傷寒後患流注腫痛潮熱用十宣敗毒等劑出稀膿五六碗許發熱惡寒煩躁作渴殊類破傷風症而歿一男子背瘡未痊斂以膏藥剪孔貼之患破傷風症而歿此先失於內補外邪襲其虛耳余見此症貼膏藥剪孔欲其通氣而反患破傷風搽斂藥生肌欲其收口而反助其餘毒以致歿者多矣可不慎哉論瘡瘍隨症加減用藥十八內經云形傷痛氣傷腫先腫而後痛者形傷氣也先痛而後腫者氣傷形也東垣先生謂胃為五臟之本源人身之根蒂丹溪先生云癰疽因積毒在臟腑宜先助胃壯氣以固其本夫然則氣血凝結者自散膿瘀已成者自潰肌肉欲死者自生肌肉已死者自腐死肉已潰者自斂若獨攻其瘡脾胃一虛七惡蜂起其不死者幸矣大凡前症須用托裡消毒散為主若高腫焮痛熱毒也加黃連漫腫微痛氣虛也去金銀花連翹二味加參術頭痛發熱邪在表也本方加川芎羌活若外邪在表而元氣實者暫用人參敗毒散頭痛惡寒表虛也去二味加參耆發熱飲冷便祕內熱也去參耆歸術加大黃發熱飲熱便祕內虛也去二味加參耆歸術寒熱飲冷小便澀滯肝熱也去參耆加柴胡山梔不作膿膿不潰氣虛也去二味及白芷加參朮肉桂如不應暫用十全大補湯腫赤作痛血凝滯也本方加乳香沒藥如不應暫用仙方活命飲膿出反痛氣血虛也去三味即金銀花連翹白芷後仿此加參耆歸地肉赤而不斂血虛而有熱也去三味加熟地牡丹皮肉黯而不斂陽氣虛寒也去三味加參耆白蘞官桂漫腫不痛或肉死不潰脾氣虛也去三味加人參白朮如不應加薑桂更不應急加附子肉白而不斂陽氣虛也去三味加參耆歸術膿多而不斂氣血虛也去三味加參耆歸朮熟地如不應暫用十全大補湯飲食少思而不斂胃氣虛也去三味加參耆如不應暫用補中益氣湯飲食難化而不斂脾氣虛也去三味加參術如不應暫用六君子湯又不應佐以八味丸膿多而帶赤血虛也去三味加歸地參術如不應暫用八珍湯加牡丹皮忿怒晡熱而出血肝火血虛也去三味加牡丹皮熟地炒黑山梔如不應暫用八珍湯送六味丸面青脅脹而出血肝氣虛而不能藏血也去三味加山茱山藥五味子如不應兼六味丸食少體倦而出血脾氣虛而不能攝血也去三味加參耆歸地兼鬱結少寐更加遠志酸棗仁茯神龍眼肉如不應暫用歸脾湯欲嘔作嘔或外搽內服寒涼或痛甚或感寒邪穢氣而嘔胃氣虛也去三味加藿香參術飲食少思腸鳴腹痛腹冷泄瀉脾氣虛寒也去三味加炮薑木香手足逆冷脾血虛寒也更加附子煎送四神丸飲冷作渴熱毒也加赤小豆知母如不應暫用竹葉黃耆湯善食作渴胃火也加石膏山梔如不應暫用竹葉石膏湯膿多而作渴氣血虛也去三味加熟地黃五味子如不應暫用十全大補湯加五味子麥門冬口乾舌燥腎氣虛也去三味加熟地山茱山藥如不應兼六味丸又不應佐以補中益氣湯自汗內熱口乾胃氣虛也去三味加參耆歸術如不應暫用六君子湯盜汗內熱口乾陰血虛也去三味加熟地麥門五味如不應暫用當歸六黃湯莖中痛而小便不利精內敗也去三味加山茱山藥澤瀉如不應佐以六味丸愈便則愈痛愈痛則愈便精復竭也去三味煎送六味丸食少體倦口乾飲熱小便黃短脾肺虛熱也去三味加五味子山茱萸如不應暫用六味丸勞役而小便黃元氣下陷也去三味加升麻柴胡汗後而小便黃短腎虛熱也去三味加升麻柴胡如不應煎送六味丸口燥作渴小便頻數腎水虧也去三味加五味子山茱山藥熟地如不應兼用六味丸四肢逆冷腎氣虛寒也去三味加桂附如不應佐以八味丸食少體倦作渴胃氣虛也去三味加參耆白朮如不應暫用補中益氣湯體倦頭痛或眩暈中氣虛也去三味加柴胡升麻如不應暫用補中益氣湯加蔓荊子日晡頭痛或眩暈陰血虛也去三味加熟地黃如不應佐以六味丸夢泄遺精頭暈頭痛或痰喘氣促腎虛不能納氣也去三味並川芎佐以六味丸如不應是虛寒也用八味丸面目赤色煩熱作渴脈大而虛血脫髮躁也去三味加黃耆當歸如不應暫用當歸補血湯身熱惡衣欲投於水脈沉微細氣脫髮躁也去三味加肉桂附子如不應暫用附子理中湯善思體痛無寐盜汗脾血虛也去三味加茯苓遠志酸棗仁圓眼肉如不應暫用歸脾湯寢寐而汗出腎氣虛也去三味加五味子煎送六味丸飲食而出汗胃氣虛也去三味加參耆歸朮五味子如不應暫用六君子湯睡覺飽而出盜汗宿食也去三味加參朮半夏如不應暫用六君子湯胸滿多痰脾氣虛也去三味加桔梗半夏如不應暫用六君子湯加桔梗枳殼晡熱多痰脾血虛也去三味加歸地參術如不應暫用六君子湯加芎歸熟地咳嗽唾痰腎虧津液泛上也去三味加山茱山藥熟地如不應佐以六味丸忿怒胸痞肝氣滯也去三味加桔梗山梔如不應暫用補中益氣湯加桔梗枳殼倦怠胸痞中氣虛也去三味加參朮茯苓如不應暫用八珍湯加柴胡口苦寒熱往來肝火血虛也去三味加熟地柴胡因怒寒熱往來肝火血虛也加柴胡黃芩如不應暫用八珍湯加炒山梔炒酸棗仁酒炒黑膽草體倦寒熱往來肝脾氣滯也去三味加參耆歸術如不應暫用補中益氣湯內熱晡熱或寒熱往來陰血虛也去三味加芎歸牡丹皮柴胡如不應暫用八珍湯加牡丹皮畏寒或寒熱往來胃氣虛也去三味加參苓白朮升麻如不應暫用補中益氣湯脅痛痞滿或寒熱往來肝氣滯也去三味加青皮木香如不應屬氣血虛也更加芎歸參術若婦人勞役恚怒或適經行發熱譫語或夜間熱甚在血分也去三味加生地丹皮柴胡如不應暫用加味四物湯若誤服克伐或膿血大泄或因吐瀉或誤而入房或勞損元氣或夢泄遺精或外邪乘入以致發熱頭痛小便淋澀或滑數便血目赤煩喘氣短頭暈體倦熱渴意欲投水身熱惡衣揚手擲足腰背反張鄭聲自汗此陽氣脫陷之假熱症也若畏寒頭痛咳逆嘔吐耳聵目朦小便自遺瀉利腸鳴裡急腹痛玉莖短縮齒浮痛肢體麻痹或厥冷身痛或咬舌齧唇此陽氣脫陷之真寒症也凡此危候勿論其脈勿問其症但見有其一二亦去三味急加桂附補之庶有復生之理大抵用藥之法當分元氣虛實標本緩急若病急而元氣實者先治其標病緩而元氣虛者先治其本若病急而元氣又虛者當治其本為主而兼以治標東垣先生云形氣有餘病氣有餘當瀉不當補形氣不足病氣不足當補不當瀉丹溪先生云但見腫痛參之脈症虛弱便與滋補氣血無虧可保終吉治者審焉
