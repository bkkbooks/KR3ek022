body:
  text: 卷四治瘡瘍各症附方托裡消毒散治胃氣虛弱或因克伐不能潰散服之未成即消已成即潰腐肉自去新肉自生若腐肉既潰而新肉不能收斂屬氣虛者四君子湯為主屬血虛者四物湯為主氣血俱虛者十全大補湯為主並忌寒涼消毒之劑人參黃耆鹽水拌炒當歸酒拌川芎芍藥炒白朮炒茯苓各一錢金銀花白芷各七分甘草炙五分連翹五分上水煎服托裡散治瘡瘍因氣血虛不能起發腐潰收斂及惡寒發熱者宜用此補托其屬六淫七情或諸經錯雜之邪而為患者當各審其因而參以主治之劑其屬胃氣虛弱者當以六君子湯為主人參氣虛者多用之黃耆炒各二錢白朮炒陳皮當歸熟地黃自制茯苓芍藥酒炒各一錢半上水煎服清熱消毒散治一切癰疽陽症腫痛發熱作渴黃連炒山梔炒連翹當歸各一錢川芎芍藥生地黃各一錢半金銀花二錢甘草一錢上水煎服黃連消毒散治腦疽背疽腫焮疼痛或麻木黃連制羌活各一分黃芩黃柏各五分生地黃知母制獨活防風當歸尾連翹各四分藁本防己桔梗各五分黃耆蘇木陳皮澤瀉各二分人參甘草各三分上水煎服清涼飲治瘡瘍煩躁飲冷焮痛脈實大便祕結小便赤澀大黃炒赤芍藥當歸甘草各二錢上水煎服破棺丹治瘡瘍熱極汗多大渴便祕譫語發狂大黃二兩五錢半生半熟芒硝甘草各二兩上為末煉蜜丸如彈子大每服一丸童便酒化下白湯亦可黃連解毒湯治瘡瘍焮痛煩躁飲冷脈洪數或發狂言黃芩黃柏炒黃連炒山梔各一錢五分水煎熱服內疏黃連湯治瘡瘍發熱而嘔大便祕結脈洪而實黃連芍藥當歸檳榔木香黃芩梔子薄荷桔梗甘草各一錢連翹大黃各一錢五分每薑水煎仍量虛實治之托裡榮衛湯治瘡瘍外無焮瘇內便調和乃邪在經絡宜用此藥黃耆紅花各一錢桂枝七分蒼朮米泔浸炒柴胡連翹羌活防風當歸身酒拌甘草炙黃芩人參各一錢上酒水煎服內托復煎散治瘡瘍瘇焮在外其脈多浮邪氣勝必侵於內宜用此托之地骨皮黃芩炒茯苓白芍藥炒人參黃耆鹽水拌炒白朮炒桂甘草炙防己酒炒當歸酒拌各一錢防風二錢上先以蒼朮一升水五升煎去朮入藥再煎至二升終日飲之人參敗毒散治瘡瘍焮痛寒熱或拘急頭痛脈細有力人參羌活獨活前胡柴胡桔梗枳殼茯苓川芎甘草各一錢上水煎服仙方活命飲治一切瘡瘍未成膿者內消已成膿者即潰又止痛消毒之聖藥也穿山甲蛤粉炒黃白芷防風沒藥甘草赤芍藥當歸尾乳香天花粉貝母各一錢金銀花陳皮各三錢皂角刺一錢上酒一碗煎數沸服清心湯治瘡瘍腫痛發熱飲冷脈沉實睡語不寧即防風通聖散每料加黃連五錢每劑一兩水煎服奪命丹治疔瘡發背等症或麻木或嘔吐重者昏憒若疔毒牙關緊急用三五丸為末水調灌下有奪命之功蟾酥乾者酒化輕粉各五分枯白礬寒水石煅銅緑乳香沒藥麝香各一錢硃砂三錢蝸牛二十個另研無亦效上為末用蝸牛或酒糊丸緑豆大每服二三丸溫酒蔥湯下東垣聖愈湯治脾胃虧損膿水不止或金瘡出血心煩不安眠睡不寧五心煩熱飲食少思地黃酒拌蒸半日生地黃酒拌川芎人參各五分當歸酒拌黃耆鹽水浸炒各一錢上水煎服濟陰湯治瘡屬純陽腫痛發熱連翹山梔炒黃芩炒黃連炒各一錢芍藥一錢五分金銀花三錢甘草一錢牡丹皮一錢二分上水煎服大便祕量加大黃抑揚散治瘡屬純陽腫痛發熱天花粉三兩薑黃白芷赤芍藥各一兩上為末茶湯調搽患處沖和湯治瘡屬半陰半陽似潰非潰似腫非腫此因元氣虛弱失於補托所致人參二錢黃耆白朮當歸白芷各一錢半茯苓川芎皂角刺炒乳香沒藥各一錢金銀花一錢陳皮二錢甘草節一錢上水酒各半煎服陰陽散治瘡屬半陰半陽紫荊皮炒五兩獨活去節炒一兩赤芍藥炒二兩白芷二兩石菖蒲二兩上為末蔥酒調搽回陽湯治脾腎虛寒瘡屬純陰或藥損元氣不腫痛不腐潰或腹痛泄瀉嘔吐厥逆或陽脫陷等症乾薑炮附子炮各二錢人參白朮黃耆各三錢當歸陳皮甘草炙各二錢柴胡升麻各五分上酒水煎服不應薑附倍之抑陰散治瘡瘍元氣虛寒焮腫不消或不潰斂或筋攣骨痛一切冷症草烏二兩赤芍藥一兩炒肉桂五錢南星一兩煨白芷一兩上為末蔥湯調塗熱酒亦可托裡溫中湯治瘡瘍膿潰元氣虛寒或因克伐胃氣脫陷腸鳴腹痛大便溏泄神思昏憒此寒變內陷緩則不治羌活附子炮去皮臍四錢乾薑炒三錢益智丁香沉香木香茴香陳皮各一錢甘草炙一錢上薑水煎服附子理中湯治瘡瘍脾胃虛寒或誤行攻伐手足厥冷飲食不入腸鳴腹痛嘔逆吐瀉附子人參白茯苓白芍藥各三錢白朮四錢上水煎服薑附湯治瘡瘍真氣虧損或誤行汗下或膿血出多失於補托以致上氣喘急自汗盜汗氣短頭暈人參附子炮去皮臍一兩乾薑炮白朮各五錢上作二劑水煎服參附湯治失血過多或膿瘀大泄或寒涼汗下真陽脫陷上氣喘急自汗盜汗氣短頭暈等症急服以救元氣緩則不治人參附子炮去皮臍各五錢上薑五片水煎服不應倍之獨參湯治一切失血或膿水出多血氣俱虛惡寒發熱作渴煩躁蓋血生於氣故血脫補氣陽生陰長之理也用人參二兩棗十枚薑十片水煎徐徐服人參理中湯治瘡瘍脾胃虛寒嘔吐泄瀉飲食少思肚腹作脹或胸膈虛痞白朮人參乾薑甘草炙各等分上薑棗水煎服竹葉黃耆湯治癰疽氣血虛胃火盛而作渴淡竹葉二錢黃耆麥門當歸川芎甘草黃芩炒芍藥人參半夏石膏煅各一錢生地黃二錢上每服三五錢水煎服竹葉石膏湯治癰疽胃火盛腫痛作渴淡竹葉石膏煅桔梗木通薄荷甘草各一錢上薑水煎服當歸川芎散治手足少陽經血虛瘡症或風熱耳內癢痛生瘡出水或頭目不清寒熱少食或婦女經水不調胸膈不利脅腹痞痛當歸川芎柴胡白朮芍藥各一錢山梔炒一錢二分牡丹皮茯苓各八分蔓荊子甘草各五分上水煎服若肝氣不平寒熱加地骨皮肝氣實加柴胡黃芩氣血虛加參耆歸地脾虛飲食少思加苓術脾虛胸膈不利加參耆痰滯胸膈不利加朮半肝氣不順胸膈不利或小腹痞滿或時攻痛加青皮肝血不足胸膈不利或小腹痞滿或時作痛加熟地肝血虛寒小腹時痛加肉桂日晡發熱加歸地梔子清肝散一名柴胡梔子散治三焦及足少陽經風熱耳內作癢生瘡或出水疼痛或胸乳間作痛或寒熱往來柴胡梔子炒牡丹皮各一錢茯苓川芎芍藥當歸牛蒡子炒各七分甘草五分上水煎服若太陽頭痛加羌活柴胡清肝散治鬢疽及肝膽三焦風熱怒火之症或項胸作痛或瘡毒發熱柴胡一錢五分黃芩炒一錢人參一錢山梔炒一錢五分川芎一錢連翹桔梗八分甘草五分上水煎服小柴胡湯治肝膽經症風熱瘰癧結核或腫痛色赤或寒熱往來或日晡發熱或潮濕身熱默默不欲飲食或怒火口苦耳聾咳嗽或吐酸食苦水皆用此藥柴胡二錢黃芩一錢人參半夏各七分甘草炙五分上薑水煎服補陰八珍湯治瘰癧等瘡屬足三陰虛者當歸川芎熟地芍藥人參白朮茯苓甘草黃柏酒炒黑知母酒炒各七分上水煎服瀉青丸治肝經實熱瘰癧腫痛寒熱或脅乳作痛大便祕結當歸龍膽草酒炒川芎山梔大黃炒羌活防風各等分上為末蜜丸雞頭子大每服一二丸白湯送下若血虛者四物加山梔柴胡或逍遙散若腎水虧損不能生肝木而自病筋攣結核或肢節拳攣或似中風宜用六味丸加五味子散腫潰堅湯治瘰癧堅硬氣血無虧宜用之柴胡四分升麻三分龍膽草酒炒五分連翹三分黃芩酒炒四分甘草炙二分桔梗五分昆布五分當歸尾酒拌白芍藥炒各三分黃柏酒炒三分知母酒炒五分葛根三稜酒拌微炒廣木香各三分栝蔞根五分上水煎服益氣養榮湯治懷抱抑鬱或氣血損傷四肢頸項等處患腫不問軟硬赤白腫痛或潰而不斂人參茯苓陳皮貝母香附當歸酒拌川芎黃耆鹽水拌炒熟地黃酒拌芍藥炒各一錢甘草炙桔梗各五分白朮炒二錢柴胡六分上薑水煎服必效散治瘰癧氣血雖無虧損內有癧核未去而不能愈南硼砂二錢五分輕粉一錢麝香五分巴豆五個去皮心膜白檳榔一個斑蝥四十個去頭翅同糯米炒上同研極細末取雞子二個去黃用清調藥仍入殼內以濕紙數重糊口入飯甑候熟取出曝乾研末虛者每服半錢實者一錢用炒生薑酒五更初調服如覺小腹痛用益元散一服其毒俱從小便出胎婦勿餌毒去後多服益氣養榮湯瘡口自合針頭散治一切頑瘡內有瘀肉癧核不化瘡口不合宜用此藥腐之赤石脂五錢乳香白丁香各三錢白砒一錢黃丹一錢輕粉麝香各五分蜈蚣一條炙乾上為末搽瘀肉上其肉自腐若瘡口小或痔瘡用糊和作條子陰乾紝之凡瘡久不合者內有膿管須用此腐之內服托裡之劑神仙隔蒜灸法治一切癰疽腫毒前論言之詳矣凡大痛或不痛或麻木痛者灸至不痛不痛灸至痛其毒隨火而散此拔引郁毒從治之法也信有回生之功其法用大蒜頭切三分厚安瘡頭上用艾炷於蒜上灸之五炷換蒜再灸未成即消已成殺其大勢瘡患大以蒜杵爛攤患處將艾鋪蒜上灸之蒜敗再換瘡色紫或白而不起發不作膿不大痛不問日期最宜多灸神效蔥尉法治流注結核骨癰鶴膝等症腫硬或先以隔蒜灸而余腫未消最宜用尉以助氣血而行壅滯其功甚大又為跌撲傷損止痛散血消腫之良法用蔥白頭搗爛炒熱頻尉患處冷再換神效桑枝灸治發背不起或瘀肉不潰此陽氣虛弱用桑枝燃火著吹熄焰用火灸患處片時日三五灸以消腫潰若腐肉已去新肉生遲宜灸四畔其陰瘡瘰癧流注臁瘡惡瘡久不愈者亦宜用之大抵此法未潰則解熱毒止疼痛消瘀腫已潰則補陽氣散餘毒生肌肉其陽症腫痛甚或重如負石初起用此法出毒水即內消其日久者用之雖潰亦淺且無苦楚惜患者不知有此治者亦不肯用此也烏金膏治發背中央肉死塗之即腐未死塗之即生若初起腫痛用點數處其毒頓消若肉腐塗之即潰若惡瘡頑瘡元氣無虧久不收斂者內有毒根以紙燃蘸紝其內有等發背因元氣虛弱或因克伐元氣胃氣虧損毒氣散漫中黯外赤不腐不潰服大補之劑中塗三四寸許至五六日間赤黯之界自有裂紋如刀劃之狀中央漸潰漸脫須用純陽之藥以接其元氣庶能收斂若妄用刀針去肉出血陽隨陰散元氣愈傷或塗涼藥則毒氣不解氣血愈虛非徒無益而又害之其方用巴豆一味去殼炒黑研如膏點於患處臨用合之以上三法雖不出於方書余推其意而制用之良有奇驗砭法治丹毒疔瘡紅絲走散或時毒瘀血壅盛用細瓷器擊碎取有鋒芒者一塊以箸一根劈開頭尖夾之用線縛定兩手指輕撮箸稍令磁芒正對患處懸寸許再用箸一根頻擊箸頭令毒血遇刺皆出毒入腹膨脹者難治豆豉餅治瘡瘍腫痛硬而不潰及潰而不斂並一切頑瘡惡瘡用江西豆豉餅為末唾津和作餅子如錢大厚如三文置患處以艾壯於餅上灸之干即易之如背瘡用漱口水調作餅覆患處以艾鋪餅上灸之如未成者即消已成者亦殺其大毒如有不效氣血虛敗也乳香定痛散治一切瘡瘍潰爛疼痛乳香沒藥各五錢滑石一兩寒水石一兩冰片一錢上為細末搽患處痛即止甚效青龍湯治肺受風寒咳嗽喘急半夏湯泡七次二兩五錢乾薑炮細辛麻黃去節肉桂芍藥甘草炙各三兩五味二兩拌炒上每服五錢薑水煎服葶藶大棗瀉肺湯治肺症胸膈脹滿上氣喘急或身面浮腫鼻塞聲重用甜葶藶炒黃色研末每服三錢棗十枚水二鍾煎一鍾去棗入藥再煎七分食後服桔梗湯治肺症咳嗽胸膈兩脅作痛咽乾口燥煩悶作渴時出臭濁桔梗炒貝母去心當歸酒浸栝蔞仁枳殼麩炒薏苡仁桑白皮炒甘草節防己去皮各一錢黃耆鹽水拌炒五味子搗炒百合蒸各一錢五分葶藶炒地骨皮知母炒杏仁各五分上薑水煎服人參補肺湯治肺症咳喘短氣或腎水不足虛火上炎痰涎湧盛或吐膿血發熱作渴小便短澀人參黃耆白朮茯苓陳皮當歸各一錢山茱萸肉山藥各二錢五味子五分麥門七分甘草炙五分熟地自制一錢半牡丹皮八分上薑棗水煎服人參平肺散治心火克肺傳為疽痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利若因肝木太過而致當補肺若因腎水不足而患當補脾肺若因心火旺而自病當利小便人參陳皮甘草地骨皮茯苓各二錢知母炒七分五味子拌炒四分青皮天門冬去心各四分桑白皮炒一錢上水煎服參耆補脾湯治肺疽脾氣虧損久咳吐膿涎或中滿不食必服此藥補脾土以生肺金否則不治人參白朮各二錢黃耆二錢五分茯苓陳皮當歸各一錢升麻三分麥門冬七分五味子四分桔梗六分甘草炙五分上薑棗水煎服射干湯治胃癰吐膿血射干去毛山梔仁赤茯苓升麻各一錢赤芍藥一錢五分白朮五分上水煎服薏苡仁湯治風熱唇口瞤動或結核或浮腫薏苡仁炒防己赤小豆甘草炙各等分上水煎服栝子仁湯治産後惡露或經行瘀血作痛薏苡仁四錢桃仁去皮牡丹皮栝蔞仁各一錢上水煎服梅仁湯治腸癰壅痛大便祕澀梅仁九個去皮尖大黃炒牡丹皮芒硝各一錢冬瓜仁研三錢犀角鎊末一錢上水煎入犀末服大黃湯治腸癰小腹堅腫按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒脈遲緊膿未成急服之大黃炒朴硝各一錢牡丹皮栝蔞仁炒桃仁去皮尖各二錢上水煎服牡丹皮散治腸癰腹濡而痛時下膿牡丹皮人參天麻白茯苓黃耆炒薏苡仁桃仁去皮尖白芷當歸酒拌川芎各一錢官桂甘草炙五分木香三分上水煎服失笑散治跌撲産後心腹絞痛或不知人事或經行瘀血作痛成癰靈脂蒲黃俱炒等分上每服二三錢酒水煎熱服防風湯治破傷風表症未傳入里急服此防風羌活獨活川芎各等分上每服五錢水煎調蜈蚣散服蜈蚣散蜈蚣一對炙鰾三錢煅羌活湯治破傷風在半表半裡間宜和解急服此湯稍緩則邪入於裡不可用矣羌活菊花麻黃川芎石膏防風前胡黃芩細辛甘草枳殼白茯苓蔓荊子各一兩蒲荷白芷各五錢上每服五錢薑水煎日二三服大芎黃湯治破傷風邪傳於裡舌強口噤項背反張筋惕搐搦痰涎壅盛宜急服之川芎羌活黃芩大黃各一兩上每服五七錢水煎服白朮防風湯治破傷風服表藥過多而自汗者白朮黃耆各一兩防風二兩上每服五七錢水煎服臟腑和而自汗者可服此藥若臟腑祕小便赤而自汗者急以大芎黃湯下之六味丸一名六味地黃丸此壯水之劑夫人之生以腎為主凡病皆由腎虛而致此方乃天一生水之劑無有不可用者世所罕知若腎虛發熱作渴小便淋祕痰氣壅盛咳嗽吐血頭目眩暈小便短小眼花耳聾咽喉燥痛口舌瘡裂齒不堅固腰腿痿軟五臟齊損肝經不足之症尤當用之水能生木故也若腎虛發熱自汗盜汗便血諸血失喑水泛為痰之聖藥血虛發熱之神劑也熟地黃用生者自制八兩山茱萸去核酒浸蒸山藥各四兩牡丹皮茯苓去皮澤瀉各三兩蒸上地黃杵膏余為末蜜丸桐子大每服七八十丸滾湯下八味丸治命門火衰不能生土以致脾土虛寒而患流注鶴膝等症不能消潰收斂或飲食少思或食而不化臍腹疼痛夜多漩溺即前方加肉桂附子各一兩經云益火之源以消陰翳即此方也加減八味丸治症同上即六味地黃丸加肉桂五味子各一兩八珍湯治脾胃傷損惡寒發熱煩躁作渴或瘡瘍潰後氣血虧損膿水清稀久不能愈即四君四物合方十全大補湯治瘡瘍氣血虛弱腫痛不愈或潰瘍膿清寒熱自汗盜汗食少體倦發熱作渴頭痛眩暈似中風狀即八珍湯加黃耆肉桂補中益氣湯治元氣虛損或因克伐惡寒發熱肢體倦怠飲食少思或不能起發消散生肌收斂或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細軟弱黃耆人參白朮甘草炙各一錢五分當歸一錢陳皮五分升麻柴胡各三分上薑棗水煎空心午前服生脈散治胃氣虧損陰火上衝口乾喘促或肢體倦怠肌肉消瘦面色痿黃汲汲短氣汗出不止食少作渴或膿水出多氣血俱虛煩躁不安睡臥不寧或濕熱大行火土合病脾胃虛弱身重氣短或金為火制絶寒水生化之源肢體痿軟腳欹眼黑等症人參五錢麥門冬二錢五味子一錢上水煎服如不應倍之人參養榮湯治脾胃虧損氣血俱虛發熱惡寒四肢倦怠肌肉消瘦面色痿黃汲汲短氣食少作渴凡大病後最宜用此白芍藥炒一錢半人參陳皮黃耆蜜炙桂心當歸白朮甘草炙各一錢熟地黃五味子炒杵茯苓各七分半遠志五分上薑棗水煎服四君子湯治脾胃虛弱或因克伐腫痛不散潰斂不能宜用此以補脾胃諸症自愈若誤用攻毒七惡隨至脾胃虛弱飲食少思或食而難化或欲作嘔或大便不實若脾胃氣虛瘡口出血吐血便血尤宜用之蓋氣能攝血故也凡氣血俱虛之症宜於前湯但加當歸脾胃即旺飲食自進陰血自生若用四物湯沉陰之劑脾胃復傷諸症蜂起若命門火衰而脾土虛寒必用八味丸以補土母人參白朮茯苓各二錢甘草炙一錢上薑棗水煎服六君子湯治脾胃虛弱或寒涼克伐腫痛不消或不潰斂宜服此湯以壯營氣諸症自愈即前方加陳皮半夏異功散治脾胃虛弱飲食少思即四君子湯加陳皮四物湯治血虛發熱或因失血或因克伐或因潰後致晡熱內熱煩躁不安皆宜服之經云血生於脾若脾虛不能生血者宜用四君子加當歸酒炒白朮以補脾當歸熟地黃各三錢芍藥二錢川芎一錢五分上水煎服歸脾湯治憂思傷脾血虛發熱食少體倦或脾不能攝血以致妄行吐下或健忘怔忡驚悸少寐或心脾作痛自汗盜汗或肢體腫痛大便不調或婦人經候不準晡熱內熱或唇瘡流注等症不能消散潰斂白朮白茯苓黃耆炒當歸龍眼肉遠志酸棗仁炒各一錢木香五分甘草炙三分人參一錢上薑棗水煎服當歸補血湯治脾胃損傷或服峻劑致血氣俱虛肌熱大渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無此病多得於飢飽勞役者若誤服白虎湯必死當歸三錢黃耆炙一兩上水煎服六一湯黃耆炙六錢甘草炙一錢上水煎服加味逍遙散治肝脾血虛內熱發熱或遍身瘙癢寒熱或肢體作痛頭目昏重或怔仲頰赤口燥咽乾或發熱盜汗食少不寐或口舌生瘡耳內作痛或胸乳腹脹小便欠利甘草炙當歸芍藥酒炒茯苓白朮炒柴胡各一錢牡丹皮山梔炒各七分上水煎服黃芩清肺湯治肺經陰虛火燥而小便不通若因脾經有熱當清其脾若因心火克肺當制其心黃芩一錢梔子三個打碎上水煎服滋腎丸治腎經陰虛發熱作渴便赤足熱腿軟等症凡不渴而小便祕熱在下焦血分也最宜此藥經云無陰則陽無以化若脾肺燥熱所遺當滋其化源知母黃柏各酒炒一兩肉桂二錢上為末水丸桐子大每服百丸空心白滾湯下五苓散治下部濕熱瘡毒小便赤少澤瀉豬苓肉桂白朮赤茯苓各等分上為細末每服一二錢熱湯調下犀角地黃丸治胃火血熱妄行吐衄或大便下血者犀角鎊末生地黃赤芍藥牡丹皮各一錢半升麻黃芩炒各一錢上水煎熟入犀末服若因怒而致加山梔柴胡若脾氣虛而不能攝用歸脾湯若肝脾火動而妄行用加味逍遙散若脾氣虛而不能統用補中益氣湯加炮黑乾薑若血虛有火而妄行用四物加炮薑若腎經虛火而血妄行用六味丸料不應急加肉桂以引虛火歸源清胃散治膏粱積熱唇口腫痛齒齦潰爛焮痛連頭面或惡寒發熱升麻二錢生地黃牡丹皮黃連當歸酒洗各一錢上水煎服痛未止石膏之類可量加潤腸丸治脾胃伏火大腸乾燥或風熱血結宜用此丸通之若結在直腸宜豬膽汁導之蓋腎主五液開竅於二陰若津液滋潤大便通調若津液不足脾氣虧損必當培補猶忌前藥麻子仁桃仁去皮尖各一兩羌活歸尾大黃煨皂角刺秦艽各五錢上各另研為末煉蜜或豬膽汁丸桐子大每服三四十丸白湯下若用豬膽汁導之而不結燥急補元氣四神丸治脾腎虛弱大便不實飲食少思或小腹作痛或産後泄瀉肚腹作痛不思飲食肉豆蔻五味子各一兩補骨脂四兩吳茱萸浸炒一兩上為末水二碗薑八兩紅棗一百枚煮熟取棗肉和末丸桐子大每服五七十丸空心食前白湯下二神丸治脾腎虛寒不思飲食或侵晨五更泄瀉或飲食少思大便不實其功甚效如不應乃命門火衰急用八味丸補火而生土破故紙四兩炒肉豆蔻二兩生用上為末用大紅棗四十枚生薑四兩水煮熟去薑取棗肉和藥丸桐子大每服五十丸空心鹽湯送下越鞠丸治六郁牙齒作痛口舌生瘡或胸膈痞滿嘔吐吞酸或腹脹腿痠等症蒼朮炒神麯炒香附山楂山梔炒撫芎麥芽炒各等分上為末水調麴櫱麵糊丸桐子大每服七十丸白湯下二陳湯治脾虛中脘停痰嘔吐噁心或頭目不清飲食少思等症陳皮半夏茯苓各一錢甘草炙五分上薑水煎錢氏白朮散治胃氣虛或因克伐或因吐瀉口乾作渴飲食少思藿香白朮炒木香白茯苓甘草炒人參各一錢乾葛二錢上水煎服生地黃丸治師尼寡婦室女乍寒乍熱而患瘡瘍等症肝脈弦長而出魚際生地黃一兩酒拌杵膏秦艽黃芩硬柴胡各五錢赤芍藥一兩上為末入地黃膏加煉蜜少許丸桐子大每服三十丸烏梅煎湯下日進二服加味地黃丸治肝腎陰虛瘡症或耳內癢痛出水或眼昏痰氣喘嗽或作渴發熱小便赤澀等症乾山藥山茱萸牡丹皮澤瀉白茯苓熟地黃柴胡五味各另為末等分上將熟地黃掏碎酒拌濕杵膏入前末和勻加煉蜜為丸桐子大每服百丸空心白湯送下不應用加減八味丸琥珀膏治頸項瘰癧及脅下初如梅子腫結硬強漸如連珠不消不潰或潰而膿水不絶經久不瘥漸成漏症琥珀一兩木通桂心當歸白芷防風松脂硃砂研木鱉子肉各五錢麻油二斤丁香木香各二錢上先用琥珀丁香桂心硃砂木香為末其餘藥入油內煎黑濾去粗徐徐入黃丹再煎軟硬得中即成膏矣人參黃耆湯治潰瘍飲食少思無睡發熱人參麥門冬陳皮白朮蒼朮各五分黃耆一錢黃柏炒四分升麻歸身各五分上水煎服托裡當歸湯治潰瘍氣血俱虛瘡口不斂或晡熱內熱寒熱往來或婦人諸瘡經候不調小便頻數大便不實等症當歸黃耆人參熟地黃川芎芍藥各一錢柴胡甘草各五分上水煎服人參內托散治瘡瘍潰膿而作痛者人參黃耆當歸川芎厚朴防風白芷桔梗官桂紫草木香甘草上入糯米一撮水煎服藿香正氣散治外感風寒內停飲食頭疼寒熱或霍亂泄瀉或作瘧疾等症桔梗大腹皮紫蘇茯苓白芷半夏陳皮白朮厚朴各一錢炙甘草五分藿香一錢五分上薑棗水煎服升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便赤黃四肢困倦甘草麥芽陳皮豬苓各三分澤瀉益智仁半夏防風神麯升麻柴胡羌活各五分蒼朮一錢白朮二錢茯苓七分上薑棗水煎服十宣散治瘡瘍脈緩澀體倦惡寒或脈浮緊細用之以散風助陽氣也人參當歸黃耆桔梗炙草白芷川芎各一錢厚朴防風肉桂各五分上水煎服參朮膏治中氣虛弱諸藥不應或因用藥失宜耗傷元氣虛症蜂起但用此藥補其中氣諸症自愈人參白朮各等分上水煎稠湯化服之清燥湯治元氣虛弱濕熱乘之肢體痠軟或頭目眩暈飲食少思口乾作渴或自汗盜汗胸滿氣促小便赤少大便不調等症黃耆一錢五分五味子九粒黃連二分蒼朮白朮麥門冬生地黃陳皮澤瀉各五分茯苓人參去蘆當歸酒洗升麻各三分神麯炒豬苓柴胡炙草各二分黃柏酒炒三分上水煎服補真丸治真陰虧損諸症肉蓯蓉酒浸焙乾葫蘆巴炒附子陽起石五味子菟絲子洗淨酒浸肉豆蔻川烏沉香鹿茸酒浸炒巴戟天去心鍾乳粉各一兩半上為末用羊腰子兩對治如食法酒煮搗爛入酒糊丸如梧桐子每服七十丸空心米飲鹽湯任下托裡健中湯治瘡瘍元氣素虛或因涼藥傷胃飲食少思或作嘔瀉等症人參白朮茯苓各二錢半夏炮薑各一錢炙草五分黃耆一錢五分肉桂三分上薑棗水煎服托裡益中湯治中氣虛弱飲食少思或瘡不消散或潰而不斂人參白朮陳皮半夏茯苓炮薑各一錢木香炙草各五分上薑棗水煎服托裡益青湯治脾土虛弱肝木所侮以致飲食少思或胸膈不利等症人參白朮茯苓半夏各一錢芍藥柴胡各五分陳皮一錢甘草五分上薑棗水煎服托裡清中湯治脾胃虛弱痰氣不清飲食少思等症人參白朮陳皮茯苓各一錢半夏八分桔梗七分甘草五分上薑棗水煎服托裡益黃湯治脾土虛寒水反侮土以致飲食少思或嘔吐泄瀉等症人參白朮陳皮茯苓半夏各一兩炮薑丁香炙草各五分上薑棗水煎服托裡越鞠湯治六郁所傷脾胃虛弱飲食少思等症人參白朮各二錢陳皮半夏各一錢山梔川芎香附蒼朮各七分炙草五分上薑棗水煎服乳香止痛散治瘡腫不止粟殼三錢白芷一錢五分炙草陳皮各一錢乳香五分沒藥五分丁香三分上作二劑水煎服濟生犀角地黃湯治鬱熱不解衄血便血等症犀角生地白芍藥牡丹皮各等分上每五七錢水煎服加減同上亦治便血痔瘡方雄黃五分細研五靈脂去石燒過斷煙五倍子泡過各一錢沒藥二錢半明淨者白礬半飛半生上為細末研極細用紙花子貼瘡口上豬蹄湯香白芷黃芩赤芍藥生甘草當歸羌活露蜂房取有蜂兒者上先將豬蹄彎一隻用水數碗煮熟取清汁分作十數次每次用前藥一兩煎十數沸去滓無風處淋洗死肉惡隨洗而下極效神效栝蔞散治乳癰初起者自消膿成者自潰及一切癰疽或潰後餘毒亦宜用之黃栝蔞一枚當歸五錢生甘草五錢乳香沒藥各五錢上用水酒煎服清肝解鬱湯治肝經血虛風熱或肝經鬱火傷血乳內結核或為腫潰不愈凡肝膽經血氣不和之症皆宜用此藥人參一錢柴胡八分白朮一錢五分牡丹皮八錢茯苓一錢陳皮八分甘草五分當歸一錢五分貝母一錢川芎八分山梔炒芍藥炒熟地黃各一錢上水煎服清肝益榮湯治肝膽小腸經風熱血燥筋攣結核或耳項胸乳脅肋作痛或作瘊子並一切肝火之症柴胡七分山梔當歸木瓜不犯鐵器茯苓各一錢川芎芍藥炒各七分龍膽草八分白朮二錢熟地一錢五分炙草五分上薑水煎服益元散滑石六兩甘草一兩上為末每服一錢酒調下神效開結散治癭疾不問年歲極驗沉香木香橘紅四兩豬厭肉子生於豚豬項下珍珠四十九粒砂鍋內泥封口煨過絲一枚如棗大取四十丸上為末每服一錢臨臥冷酒調搽徐徐咽下輕者三五服重者一料痊愈修合用除日效忌鹹酸油膩澀氣等物海藻散堅丸治肝經癭瘤海藻昆布各一兩小麥四兩醋煮炒乾龍膽草二兩上為末煉蜜丸桐子大每服二三十丸臨臥白湯下並噙化咽之普濟消毒散治天行時毒頭面腫痛或咽喉不利若飢饉之後患之最宜用仍當固胃氣黃芩連翹各五錢人參三錢陳皮玄參甘草柴胡桔梗各一錢牛蒡子馬勃板藍草根各七分白殭蠶升麻各五分上水煎服大便祕量加大黃通氣散治時毒腫甚取嚏以泄其毒玄參一錢五分豬牙皂角川芎各二錢藜蘆五分羊躑躅花二錢五分上為末用紙捻蘸少許入鼻內取嚏為度防風通聖散治時毒熱毒便祕熱燥若時毒飢饉之後胃氣虧損者須當審察非大滿大實不用防風當歸川芎芍藥大黃芒硝連翹薄荷麻黃桔梗石膏黃芩各一兩白朮山梔荊芥各二錢五分甘草二兩滑石一兩上水煎服或為末白湯調下仍量人虛實葛根牛蒡湯治時毒腫痛而便利調和者葛根管仲甘草又名國老豆豉牛蒡半生半炒各一錢上水煎服犀角升麻湯治時毒或風熱頭面腫痛或咽喉不利或風熱鬢疽痄腮等症犀角升麻防風羌活各一錢白芷黃芩白附子各五分國老六分上水煎服白芷胃風湯治手足陽明經氣虛風熱面目麻木或牙關緊急眼目瞤動白芷二錢五分升麻二錢五分葛根蒼朮米泔炒各八分炙草當歸各一錢五分草豆蔻柴胡黃柏炒藁本羌活各四分蔓荊子白殭蠶三分麻黃去節七分上水煎服升麻黃連湯治胃經熱毒腮瘇作痛或發寒熱升麻川芎當歸各錢半連翹黃連牛蒡子白芷各一錢上水煎服焮連太陽加羌活連耳後加山梔柴胡梔子仁湯治時毒腫痛大便祕結鬱金枳殼升麻山梔炒各一錢上水煎服雙解散治便癰內蘊熱毒外挾風邪或交感失宜精血交錯以致腫痛大小便祕結先用此藥通解更用調補之劑辣桂大黃白芍藥澤瀉牽牛杵炒桃仁乾薑各五分上水煎服制甘草法治懸癰不拘腫潰上每用大甘草一兩切至寸許用澗水一碗浸透以慢火炙乾仍投前水浸透再炙至水乾為度卻挫細用水二鍾煎八分空心服大蘆薈丸一名九味蘆薈丸治肝火下疳潰爛或作痛焮腫或治小兒疳膨食積口鼻生瘡牙齦蝕爛等瘡並蟲蝕肛門癢痛胡黃連蘆薈黃連木香白蕪荑青皮白雷丸鶴蝨草各二兩麝香一錢上為末蒸餅糊丸桐子大每服一錢空心米湯下八正散治下疳便毒小便淋瀝脈症俱實者大黃車前子瞿麥萹蓄山梔木通各二錢滑石二兩甘草一錢上水煎服內托羌活湯治臀癰腫痛兩尺脈緊按之無力者羌活黃柏各一錢防風藁本肉桂連翹炙草蒼朮陳皮黃耆各一錢五分上水酒煎服大防風湯治足三陰經虧損外邪乘虛患鶴膝風或附骨疽腫痛或腫而不痛不問已潰未潰用三五劑後更用調補之劑附子牛膝各一錢白朮羌活人參防風各三錢川芎一錢五分辣桂黃耆白芍藥杜仲熟地甘草炙各五分上水煎服加味龍膽湯治肝經濕熱或囊癰便毒下疳懸癰腫焮作痛小便澀滯或婦人陰瘡癢痛或男子陰挺腫脹或出膿水龍膽草澤瀉各一錢車前子生地黃木通當歸尾山梔枯黃芩炙甘草各五分上水煎服清心蓮心丸治膀胱氣虛濕熱玉莖腫痛或莖竅澀滯口苦咽乾小便色赤或白濁夜安靜而晝發熱黃芩麥門冬地骨皮車前子炙甘草各一錢半石蓮肉白茯苓黃耆柴胡人參各一錢上水煎服五淋散治膀胱有熱水道不通或尿如豆汁或如砂石或如膏汁或熱沸便血赤茯苓錢半赤芍藥山梔各二錢當歸甘草各一錢五分上用燈心三十根水煎服清肺飲治渴而小便不利乃肺經有熱是絶寒水生化之源宜用此藥以清化源其水自生而便自利矣茯苓二錢豬苓三錢澤瀉五分琥珀五分燈心一分木通七分通草六分車前子一錢瞿麥五分萹蓄七分上為細末每服五錢水煎服腎氣丸治腎經陽虛陰無所化以致膀胱淋漓或脾肺氣虛不能通調水無所化而膀胱癃閉或腎氣虛熱於厥陰之絡陰挺痿痹而溺頻數或腎水虛弱陰虧難降使津液敗濁而為痰水又治腎虛便血及諸見血發熱自汗盜汗等症之聖藥也即六味丸方見前還少丹治足三陰經虛損患膝風等症又補脾腎進飲食之良劑也肉蓯蓉去甲酒浸遠志去心甘草湯泡去骨茴香炒巴戟去心枸杞子山藥牛膝熟地黃為膏石菖蒲杜仲五味子白茯苓楮實子山茱萸各等分上為末用紅棗肉同蜜為丸桐子大每服七十丸溫酒送下每日三服白湯送下不換金正氣散治脾氣虛弱寒邪相搏痰停胸膈寒熱少食厚朴藿香半夏蒼朮陳皮甘草各等分上薑棗水煎服槐花散治腸風濕熱下血槐花青皮各六分當歸一錢荊芥熟地黃白朮各六分川芎四分升麻二錢上水煎服四生散治臁腿瘡淫不愈或目昏花名腎臟風並治風癬疥癩血風瘡症白附子真者生用黃耆獨活蒺藜各等分上為末每服二錢用豬腰子一枚批開入藥濕紙包裹煨熟空心連腰子細嚼鹽湯送下消風散一名人參消風散治風熱癮疥瘙癢發熱或頭皮腫癢頭目昏眩鼻流清水嚏噴聲重耳作蟬鳴荊芥穗炙草人參白殭蠶白茯苓防風芎藭藿香蟬蛻各二兩陳皮厚朴薑製羌活各五分上為末每服三錢茶清調下瘡癬溫酒下升麻和氣湯治風癬瘡疥熱結大便不通當歸陳皮各一錢芍藥酒炒枳殼麩炒各八分半夏薑製蒼朮米泔浸炒桔梗炒黃色白芷浸軟切片白茯苓炙草各一錢乾薑炮黑大黃各五分升麻三分上水煎服換肌消毒散治時瘡不拘初起潰爛土茯苓五錢當歸酒洗白芷皂角刺薏苡仁各一錢白蘚皮木瓜不犯鐵器木通金銀花各七分炙草五分上水煎服九味羌活湯治風熱鬱遏瘡焮作痛或遍身作痛或拘急不利又治頭痛惡寒脊強脈浮緊又治非冬時天有暴寒人中之頭痛寒熱宜用此以代麻黃湯此神藥也羌活防風蒼朮各錢半川芎白芷生地黃芩煮軟切片細辛甘草各一錢上水煎服衣覆之取微汗濕司天加蒼朮天淫雨亦加如渴加石膏三錢知母一錢不渴不加加味羌活散即前湯加金銀花連翹當歸飲子治風濕所傷以致瘡疥等症當歸黃耆芍藥荊芥穗防風蒺藜何首烏生地黃川芎甘草各等分上水煎服黑丸子一名和血定痛散治跌撲墜墮筋骨疼痛或瘀血壅腫或外感風寒肢體作痛若流注膝風初起服之自消若潰後氣虛而發熱與補劑兼服自斂百草霜白芍藥各一兩赤小豆一兩五錢川烏炮三錢白蘞一兩六錢白芨當歸各八錢南星泡三錢牛膝焙六錢補骨脂焙八錢上各別為末酒糊丸桐子大每服三十丸鹽湯溫酒任下孕婦不可服太乙膏治一切瘡瘍並宜貼之若元氣無虧用隔蒜灸更服活命飲以收全功玄參白芷當歸肉桂大黃赤芍藥生地黃各一兩上用麻油二斤入銅鍋內煎至黑濾去粗入黃丹十二兩再煎水中捻軟硬得中即成膏矣藜蘆膏治一切瘡疽胬肉突出不問大小長短用藜蘆一味為末以生豬脂和研如膏塗患處周日易之治便血黃連四兩吳茱四兩同一鍋炒不同研糞前紅用茱調酒糞後紅用酒調連元氣虧損者當以補藥加之方效二味用熱湯拌濕燉滾湯中半日藥氣相和炒將焦各揀出聽用甚妙即制茱萸黃連法也黃礬丸治金石發疽及一切瘡疽解毒止痛明白礬一兩黃蠟五錢上熔蠟和礬末急和勻衆手丸桐子大每服十丸漸漸加二十丸滾湯下如服金石發疽別用白礬末一兩作三五服溫酒調下有人遍身生瘡狀如蛇頭服之即效此藥能解毒氣內攻須多服有效治毒蛇咬熔滴傷處痛止毒出仍服兩許當歸膏治發背癰疽湯火等症去腐肉生新肉其肉未壞者用之自愈肉已死而用之自潰新肉易生搽至肉色漸白其毒始盡生肌最速其外肉焮干爬連好肉作痛用之自愈亦不結痂又免皴揭之痛殊有神效蓋黃蠟主生肌止痛補血續筋性味甘溫非偏勝毒藥故與新肉相宜此方余已刊行近之治者亦多用之川當歸一兩麻油真正者四兩淮慶生地一兩黃蠟一兩如白蠟止用五錢上先用當歸地黃入油煎黑去粗入蠟熔化候溫攪勻即成膏矣用塗患處將紙蓋之發背癰疽湯火等症潰爛用之尤妙凡死肉潰爛已盡好肉有些須尚連宜用利刀剪之蓋死肉有毒去遲則傷新矣如洗拭換膏必須預備即貼之若死肉去盡尤宜速貼然新肉畏風尤甚不可忽也蠲痹消毒散治時瘡肢節筋攣薑黃土茯苓獨活各五錢白朮當歸各一錢五分赤芍藥一錢白芷五分上水煎服
