body:
  text: 卷二論腦疽一腦疽屬膀胱經積熱或濕熱上湧或陰虛火熾或腎水虧損陰精消涸初起腫赤痛甚煩渴飲冷脈洪數而有力乃濕熱上湧當用黃連消毒散並隔蒜灸以除濕熱漫腫微痛渴不飲冷脈洪數而無力乃陰虛火熾當用六味丸及補中益氣湯以滋化源若口舌乾燥小便頻數或淋漓作痛及腎水虧損急用加減八味丸及前湯以固根本引火歸經若不成膿不腐潰陽氣虛也四君加歸耆不生肌不收斂脾氣虛也十全大補湯若色黯不潰或潰而不斂乃陰精消涸名曰腦爍為不治若攻補得宜亦有可愈治者審焉治驗一婦人患前症口乾舌燥內服清暑外敷寒涼色黯不臖胸中氣噎此因內寒而外假熱也彼疑素有痰火不欲溫補余以參耆各五錢薑桂各二錢一劑頓然潰又用大補藥而愈一婦人冬間患此腫痛熱渴余用清熱消毒藥潰之而愈次年三月其舌腫大遍身發疔如葡萄不計其數手足尤多乃脾胃受毒也先各刺出黑血隨服奪命丹七粒出臭汗瘡熱益甚便祕二日與大黃芩連各三錢升麻白芷山梔薄荷連翹各二錢生甘草一錢水煎三五沸服之大小便出臭血甚多下體稍退乃磨入犀角汁再服舌本及齒縫出臭血諸毒乃消更以犀角地黃湯而愈論耳瘡二耳瘡屬手少陽三焦經或足厥陰肝經血虛風熱或肝經燥火風熱或腎經虛火等因若發熱焮痛屬少陽厥陰風熱用柴胡梔子散若內熱癢痛屬前二經血虛用當歸川芎散若寒熱作痛屬肝經風熱用小柴胡湯加山梔川芎若內熱口乾屬腎經虛火用加味地黃丸如不應用加減八味丸余當隨症治之治驗文選姚海山耳根赤腫寒熱作痛此屬三焦風熱也但中氣素虛以補中益氣加山梔炒黃芩牛蒡子治之而愈一儒者因怒耳內作痛出水或用祛風之劑筋攣作痛肢體如束此肝火傷血也用六味丸料數服而愈舉人毛石峰子年二十耳內出水或作痛年餘矣脈洪數左尺益甚此屬肝腎二經虛熱也用加減八味丸料一劑而愈一男子每入房耳內或作癢或出水常以銀簪探入甚喜陰涼此屬腎經虛熱也用加減八味丸而愈一婦人因怒發熱每經行即兩耳出膿兩太陽作痛以手按之痛稍止怒則胸脅乳房脹腫或寒熱往來或小便頻數或小腹脹悶此皆屬肝火血虛也先用梔子清肝散二劑又用加味逍遙散數劑諸症悉退又以補中益氣加五味而全愈一婦人經行後因怒氣勞役發熱寒熱耳內作痛余以經行為血虛用八珍湯加柴胡怒氣為肝火用加味逍遙散勞役為氣傷用補中益氣湯加山梔而愈一婦人耳內作痛或腫臖寒熱發熱面色素青黃經行則變赤余以為怒氣傷肝鬱結傷脾用加味歸脾湯加味逍遙散而愈一婦人耳內腫痛寒熱口苦耳內出水焮連頸項飲食少思此肝火甚而傷脾也用小柴胡湯加山梔牡丹皮稍愈用加味逍遙散及八珍湯加柴胡山梔丹皮調補肝脾而痊愈一孀婦或耳內外作痛或項側結核內熱晡熱月經不調唾痰少食胸膈不利余以為鬱怒傷肝脾朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以清肝火生肝血而愈太卿魏莊渠癸卯仲冬耳內作痛左尺洪大而澀余曰此腎水枯竭不能生肝木當滋化源彼不信仍雜用直補之劑余謂其壻陸時若曰莊渠不能生腎水來春必不能起至明年季春十八日復請治昏憒不語順耳之分已有膿矣且卵縮便數方信余言求治辭不克用六味丸料一鍾陰莖舒出小便十減六七神思頓醒余曰若砭膿出庶延數日為立嗣之計否則膿從耳出死立待矣或謂不砭可生者余因辭歸翌日果耳內出膿至二十一日己未火日而卒憲副姜時川癸卯冬右手寸口浮數而有痰口內若有瘡然余曰此胃火傳於肺也當薄滋味慎起居以御之甲辰秋尺脈洪數而無力余曰此肺金不能生腎水無根之火上炎也宜靜調養滋化源以治之彼云今喉耳不時燥痛肢體不時發熱果是無根之火殞無疑矣後會劉古峽云姜公之病已如尊料遂拉同往視喉果腫潰脈愈洪大又誤以為瘡毒而投苦寒之劑卒於仲冬二十八日乃藥之促其亡也否則尚能延至仲夏論鬢疽三男婦同用鬢疽屬肝膽二經怒火或風熱血虛所致若發熱作渴者用柴胡清肝散腫臖痛甚者用仙方活命飲若大勢已退餘毒未散用參耆歸術為主佐以川芎白芷金銀花以速其膿膿成仍用參耆之類托而潰之若欲其生肌收斂腎虛者六味丸血虛者四物加參耆或血燥或水不能生木者用四物湯六味地黃丸氣虛者用補中益氣湯皆當滋其化源為善治驗侍御朱南皋患前症腫痛發熱日晡尤甚此肝膽二經血虛火燥也用四物湯加玄參柴胡桔梗炙草治之而愈又因勞役發熱畏寒作渴自汗用補中益氣湯去柴升加五味麥門炮姜而瘥州守胡廷器年七十患前症腫焮作痛頭目俱脹此腎水不足肝膽火盛而血燥也用六味丸料四劑瘡頭出水而愈後因調養失宜仍腫痛發熱喘渴脈洪大而虛此脾胃之氣傷也用補中益氣以補脾胃用六味地黃丸以補肝腎而痊論瘰癧四婦人症見婦人良方小兒症見保嬰粹要夫瘰癧之病屬三焦肝膽二經怒火風熱血燥或肝腎二經精血虧損虛火內動或恚怒氣逆憂思過甚風熱邪氣內搏於肝蓋怒傷肝肝主筋肝受病則筋纍纍然如貫珠也其候多生於耳前後項腋間結聚成核初覺憎寒惡熱咽項強痛若寒熱焮痛者此肝火風熱而氣病也用小柴胡湯以清肝火並服加味四物湯以養肝血若寒熱既止而核不消散者此肝經火燥而血病也用加味逍遙散以清肝火六味地黃丸以生腎水若腫高而稍軟面色痿黃皮膚壯熱膿已成也可用針以決之及服托裡之劑若經久不愈或愈而復發膿水淋漓肌體羸瘦者必純補之劑庶可收斂否則變為九瘻內經曰陷脈為瘻留連肉腠即此病也外用豆豉餅琥珀膏以驅散寒邪補接陽氣內服補中益氣湯六味丸以滋腎水培肝木健脾土亦有可愈者大抵肝膽部分結核不問大小其脈左關弦緊左尺洪數者乃腎水不能生肝木以致肝火燥而筋攣須用前藥以滋化源是治其本也外臺祕要云肝腎虛熱則生癧病機云瘰癧不繫膏粱丹毒火熱之變因虛勞氣鬱所致止宜補形氣調經脈其瘡自消散蓋不待汗之下之而已也其不詳脈證經絡受病之異者下之則犯經禁病禁虛虛之禍如指諸掌若脈洪大元氣虛敗為不治若面㿠白為金剋木亦不治若眼內赤脈貫瞳人見幾條則幾年死使不從本而治妄用伐肝之劑則誤矣蓋伐肝則脾土先傷脾傷則損五臟之源矣可不慎哉治驗閣老楊石齊子年十七發熱作渴日晡頰赤左關赤脈大而浮此肝腎陰虛用補陰八珍湯五十餘劑又加參耆二十餘劑而潰但膿水清稀肌肉不生乃以參耆歸術為主佐以芍藥熟地麥門五味膿水稠而肌肉生更服必效散一劑癧毒去而瘡口斂容臺張美之善怒孟春患此或用伐肝之劑不愈余以為肝血不足用六味地黃丸補中益氣湯以滋化源至季冬而愈一儒者愈後體瘦發熱晝夜無定此足三陰氣血俱虛用八珍加麥門五味二十餘劑又用補中益氣加麥門五味及六味丸而愈儒者楊澤之缺盆間結一核余謂此肝火血燥而筋攣法當滋腎水生肝血彼反用行氣化痰外敷南星商陸益大如碗余用補中益氣湯六味地黃丸以滋腎水間用蘆薈丸以清肝火年餘元氣復而消儒者張子容素善怒患此久而不愈瘡出鮮血左關弦洪重按如無此肝火動而血妄行症屬氣血俱虛用補中益氣湯以補脾肺用六味丸以滋肝腎而愈一男子頸間結核大潰一婦人左眉及髮際結核並用梔子清肝散海藻散堅丸以清肝火養肝血益元氣而愈此症亦有大如升斗者亦治以前藥可愈陸子溫兩耳下腫硬用伐肝軟堅之劑益甚其脈左關弦緊左尺洪數此腎水虧損而筋攣也當生肺金滋腎水則肝得血而筋自舒矣彼不悟仍服前藥竟致不起論時毒五夫時毒者為四時邪毒之氣而感之於人也其候發於鼻面耳項咽喉赤腫無頭或結核有根寒熱頭痛恍惚不寧狀如傷寒五七日之間亦能殺人治宜精辨之若脈浮數者邪在表也用葛根牛蒡子湯解毒升麻湯之類以發之脈沉澀者邪在裡也用梔子仁湯大黃湯之類以下之表裡俱病者犀角升麻湯甚者砭出惡血並用通氣散㗜鼻內取嚏以泄其毒十日外自消若搐藥不嚏者不可治之如嚏出膿血者治之必愈至七八日之間大小便通利頭面腫起高赤者可服托裡散黃耆散此病若五日以前精神昏亂咽喉祕塞語聲不出頭面赤腫食不知味者必死之候凶荒勞役患之安里為主用普濟消毒飲最善然而此症有陰有陽有可汗有可下若誤認為熱毒而用藥則謬矣治驗少宰李蒲汀用發散之藥托損元氣患處不消體倦惡寒食少口乾余用益氣湯加桔梗及托裡消毒散而愈秋官陳同野元氣素弱脈微細而伏此形病俱虛也用參朮芎歸陳皮柴胡升麻炙草以升舉陽氣用牛蒡玄參連翹桔梗以解熱毒二劑腫頓消而脈亦復矣苟以脈微細為屬陰以腫赤為屬陽而藥之鮮有不誤者一婦人潰後腫赤不消食少體倦膿清色白乃脾肺氣虛也先用六君加桔梗芎歸後用益氣湯加桔梗而斂春官袁谷虛之妹表散過度腫硬不食脈浮大按之而短此真氣絶也辭不治後果歿論痄腮六痄腮屬足陽明胃經或外因風熱所乘或內因積熱所致若腫痛寒熱者白芷胃風湯內熱腫痛者升麻黃連湯外腫作痛內熱口乾者犀角升麻湯內傷寒涼不能消潰者補中益氣湯發熱作渴大便祕結者加味清涼飲表裡俱解而仍腫痛者欲作膿也托裡散若飲食少思胃氣虛弱也六君子湯肢體倦怠陽氣虛弱也補中益氣湯膿毒既潰腫痛不減熱毒未解也托裡消毒散膿出而反痛氣血虛也人參內托散發熱晡熱陰血虛也八珍湯惡寒發熱氣血俱虛也十全大補湯若腫焮痛連耳下者屬手足少陽經當清肝火若連頤及耳後者屬足少陰經虛火當補腎水患此而有不治者多泥風熱執用克伐之藥耳治驗地官陳用之服發散之劑寒熱已退腫痛不消此血凝滯而欲作膿也用托裡消毒散而膿成又用托裡散而膿潰但膿清作渴乃氣血虛也用八珍湯加麥門五味三十餘劑而愈上舍盧懋樹兩尺脈數症屬腎經不足誤服消毒之劑致損元氣而不能愈余用補中益氣六味丸料服之而痊上舍熊棟卿頤後患之膿清體瘦遺精盜汗晡熱口渴痰氣上湧久而不愈脈洪大按之微細屬腎經虧損所致遂用加減八味丸料並十全大補湯而愈一婦人素內熱因怒耳下至頸腫痛寒熱此肝膽經火燥而血虛用柴胡梔子散而腫痛消用加味逍遙散而寒熱退用八珍湯加丹皮而內熱止論發背七男婦同用發背屬膀胱督脈經或陰虛火盛或醇酒厚味或鬱怒房勞所致若腫赤痛甚脈洪數而有力熱毒之症也為易治漫腫微痛色黯作渴脈洪數而無力陰虛之症也為難治不痛不腫或漫腫色黯脈微細陽氣虛甚也尤為難治若腫焮作痛寒熱作渴飲食如常此形氣病氣俱有餘也先用仙方活命飲後用托裡消毒散解之漫腫微痛或色不赤飲食少思此形氣病氣俱不足也用托裡散調補之不作膿或膿成不潰陽氣虛也托裡散倍加肉桂參耆膿出而反痛或膿清稀氣血俱虛也八珍湯惡寒形寒或不收斂陽氣虛也十全大補湯晡熱內熱或不收斂陰血虛也四物加參術作嘔欲嘔或不收斂胃氣虛也六君加炮姜食少體倦或不收斂脾氣虛也補中益氣湯加茯苓半夏肉赤而不斂血熱也四物加山梔連翹肉白而不斂脾虛也四君加酒炒芍藥木香小便頻數者腎陰虧損也加減八味丸若初患未發出而寒熱疼痛作渴飲冷此邪氣內蘊也仙方活命飲口乾飲熱漫腫微痛此元氣內虛也托裡消毒散飲食少思肢體倦怠脾胃虛弱也六君子湯如未應加薑桂其有死者乃邪氣盛真氣虛而不能發出也在於旬余之間見之若已發出用托裡消毒散不腐潰用托裡散如不應急溫補脾胃其有死者乃真氣虛而不能腐潰也在於二旬之間見之若已腐潰用托裡以生肌如不應急溫補脾胃其有死者乃脾氣虛而不能收斂也在於月餘見之此三證雖不見於經籍余嘗治而歷驗者治驗都憲周弘岡背患疽腫而不潰脈大而浮此陽氣虛弱而邪氣壅滯也用托裡散倍用參耆反內熱作渴脈洪大鼓指此虛火也用前散急加肉桂脈證頓退仍用托裡而愈若以為熱毒而用寒藥則誤矣太僕王的塘初起因大勞又用十宣散之類加煩渴內熱脈大無力此陽氣自傷不能升舉下陷於陰分而為內熱也余以補中益氣加酒炒芍藥麥門冬五味子治之而愈上舍張克恭患此內服外敷皆寒涼敗毒遍身作痛欲嘔少食晡熱內熱惡寒畏寒余曰遍身作痛榮衛虛而不能營於肉裡也欲嘔少食脾胃虛寒而不能消化飲食也內熱晡熱陰血內虛而陽氣陷於陰分也惡寒畏寒陽氣虛弱而不能衛於肌膚也此皆由脾胃之氣不足所致遂用補中益氣湯諸症漸退更以十全大補湯腐肉漸潰又用六君子湯加芎歸肌肉頓生而愈府庠鼓碧溪患腰疽服寒涼敗毒之藥色黯不痛瘡頭如鋪黍背重不能安寢耳聵目白面色無神小便頻澀作渴迷悶氣粗短促脈浮數重按如無余先用滋腎水之藥一劑少頃便利渴止背即輕爽乃砭去瘀血以艾半斤許明灸患處外敷烏金膏內服參耆歸朮肉桂等藥至數劑元氣稍復自疑肉桂辛熱一日不用手足並冷大便不禁仍加肉桂及補骨脂二錢肉豆蔻一錢大便如常其肉漸潰更用當歸膏以生肌肉八珍湯以補氣血而愈儒者周雨峰懷抱久郁背脊患疽肝脈弦洪脾脈浮大按之微細以補中益氣湯加桔梗貝母少用金銀花白芷二劑肝脈頓退脾脈頓復乃以活命飲二劑膿潰腫消肝脈仍弦此毒雖去而胃氣復傷仍用補中益氣湯加茯苓半夏而愈上舍蔡東之患此余用托裡之藥而潰瘡口尚未全斂時值仲冬兼咳嗽余曰瘡口未斂脾氣虛也咳嗽不止肺氣虛也法當補其母一日與其同宴見忌羊肉余曰補可以去弱人參羊肉之類是也最宜食之遂每日不撤旬余而瘡斂嗽亦頓愈矣憲副屠九峰孟春患此色黯漫腫作渴便數尺脈洪數此腎水乾涸當沒於火旺之際不信更用苦寒之藥復傷元氣以促其歿京兆柴黼庵仲夏患之色黯微腫發熱煩躁痰涎自出小腹陰實手足逆冷右關浮澀兩尺微細余曰此虛寒之症也王太僕云大熱而不熱是無火也決不能起懇求治之用大溫補之藥一劑流涎雖止患處不起終不能救舉人顧東溪久作渴六月初腰患疽不慎起居瘡潰尺余色黯敗臭小便如淋唇裂舌刺七月終請治左尺洪數左關浮澀余謂先渴而患疽者乃腎水乾涸虛火上炎多致不起然膿水敗臭色黯不痛瘡口張大乃脾氣敗而肌肉死也小便如淋痰壅喘促口乾舌裂乃脾肺敗而腎水絶也左尺洪數腎無所生也左關浮澀肺克肝也況當金旺之際危殆速矣二日後果歿蓋此症既發於外兩月方歿者乃元氣虛不能收斂也若預為調補使氣血無虧亦有得生者論乳癰乳岩結核八婦人症見婦人良方婦科撮要乳房屬足陽明胃經乳頭屬足厥陰肝經男子房勞恚怒傷於肝腎婦人胎産憂鬱損於肝脾若焮痛寒熱當發散表邪腫焮痛甚當清肝消毒並宜隔蒜灸不作膿或膿成不潰托裡散為主不收斂或膿清稀補脾胃為主若膿出反痛或作寒熱氣血虛也十全大補湯體倦口乾中氣虛也補中益氣湯晡熱內熱陰血虛也八珍湯加五味子欲嘔作嘔胃氣虛也香砂六君子湯食少作嘔胃氣虛寒也前湯加藿香食少泄瀉脾氣虛寒也前湯加炮姜若勞碌腫痛氣血未復也八珍湯倍用參苓歸術若怒氣腫痛肝火傷血也八珍湯加柴胡山梔若肝火血虛而結核者四物湯加參朮柴胡升麻若肝脾氣血虛而結核者四君子加芎歸柴胡升麻鬱結傷脾而結核者歸脾湯兼栝蔞散若鬱怒傷肝脾而結核不癢不痛者名曰乳岩最難治療苟能戒七情遠厚味解鬱結養氣血亦可保全治驗封君袁陽涇左乳內結一核月餘赤腫此足三陰虛兼怒氣所致用八珍湯加柴梔丹皮治之諸症漸退又用清肝解鬱湯而愈時當仲秋兩目連札肝脈微弦此肝脈火盛而風動也更加龍膽草五分並六味地黃丸而愈若用清熱敗毒化痰行氣鮮有不誤者一儒者兩乳患腫服連翹飲反堅硬食少內熱胸脅作痛日晡頭痛小便赤澀此足三陰虛而兼鬱怒前藥復損脾肺先用六君子加芎歸柴胡山梔四十餘劑元氣復而自潰乃作痛惡寒此氣血虛也用十全大補湯六味丸而愈一儒者兩乳作痛兩脅作脹久服流氣飲栝蔞散後左脅下結一塊肉色不變勞則寒熱用八珍加柴胡遠志貝母桔梗月餘色赤作痛膿將成矣後針出膿碗許頓然作嘔此胃氣虛而有痰也令時嚼生薑服六君子湯嘔止加肉桂而瘡愈後出仕每勞怒胸乳仍痛或發寒熱服補中益氣湯加炒山梔即愈論疔瘡九內經曰膏粱之變足生大疔多由膏粱厚味之所致或因卒中飲食之毒或感四時不正之氣或感蛇蟲之毒或感死畜之穢各宜審而治之其毒多生於頭面四肢形色不一或如小瘡或如水泡或疼痛或麻木或寒熱作痛或嘔吐噁心或肢體拘急並用隔蒜灸並服解毒之劑若不省人事或牙關緊急者以奪命丹為末蔥酒調灌之若生兩足者多有紅絲至臍生兩手者多有紅絲至心生唇面口內者多有紅絲入喉皆急用針挑破其絲使出惡血以泄其毒若患於偏僻之處藥所難導者惟灸法大有回生之功然疔之名狀雖有十三種之不同而治法但審其元氣虛實邪之表裡而庶無誤人於夭札也若專泥於疏利表散非惟無益而反害之凡人暴死多是疔毒急取燈遍照其身若是小瘡即是其毒宜急灸之並服奪命丹等藥亦有復蘇者治驗長洲庠蘇子忠鼻梁患之症屬表邪但氣血俱虛不勝發散遂用補中益氣為主佐以防風白芷而愈一男子小指患之或為針刺出血敷以涼藥掌指皆腫三四倍色黯神昏此邪氣鬱遏余先以奪命丹一服活命飲二劑稍可余因他往或為遍刺其手出鮮血碗許臂腫如瓠指大數倍用大劑參耆歸術之類及頻灸遍身而腫消但大便不實時常泄氣此元氣下陷以補中益氣加骨脂肉蔻吳茱五味又日以人參五錢麥門三錢五味二錢水煎代茶飲又用大補藥五十餘帖而愈設此症初不用解毒之劑後不用大補之藥死無疑矣白蓮涇陳伯和子唇患之有紫脈延至口內將及於喉余曰紫脈過喉則難治矣須針其脈並瘡頭出惡血以泄其毒則可彼不信別用解毒之劑遂至頭面俱腫復求治口內腫脹針不能入乃砭面唇出黑血碗許勢雖少退終至不起惜哉論肺疽肺痿十婦人症見婦人良方夫肺者五臟之華蓋也處於胸中主於氣候於皮毛勞傷氣血腠理不密外邪所乘內感於肺或入房過度腎水虧損虛火上炎或醇酒炙爆辛辣厚味熏蒸於肺或咳唾痰涎汗下過度重亡津液之所致也其候惡風咳嗽鼻塞項強胸脅脹滿呼吸不利咽燥作渴甚則四肢微腫咳唾膿血若吐痰臭濁膿血腥穢胸中隱隱微痛右手寸口脈數而實者為肺疽若吐涎沫而無膿脈數而虛者為肺痿也若咳嗽喘急者小青龍湯咳嗽胸脹者葶藶大棗瀉肺湯咳膿腥濁者桔梗湯咳喘短氣或小便短少者佐以參耆補肺湯體倦食少者佐以參朮補脾湯咳唾痰壅者腎虛水泛也六味地黃丸口乾咽燥者虛火上炎也加減八味丸此症皆因脾土虧損不能生肺金肺金不能生腎水故始萌則可救膿成則多死若脈微緊而數者未有膿也緊甚而數者已有膿也內經曰血熱則肉敗榮衛不行必將為膿大凡肺瘡咳唾膿血久久如粳米粥者難治若唾膿而不止者亦不可活也其嘔膿而自止者自愈其脈短而澀者自痊面色當白而反赤者此火之剋金皆不可活苟能補脾肺滋腎水庶有生者但恐專攻其瘡脾胃益虛鮮有不誤者矣治驗一儒者患肺癰鼻流清涕咳吐膿血胸膈作脹此風邪外傷也先用消風散加亂髮灰二服而鼻利又用四君加芎歸及桔梗湯而愈後因勞役咳嗽吐膿小便滴瀝面色黃白此脾土不能生肺金肺金不能生腎水也用補中益氣湯六味地黃丸而愈一儒者因素善飲咳膿項強皮膚不澤此脾肺氣虛外邪所乘而成肺癰也先用桔梗湯後用人參補肺湯而痊一男子咳吐痰膿胸腹膨脹兩寸與右關脈皆洪數此火不能生土而土不能生金也用桔梗湯為主佐以補中益氣湯而愈一男子不時咳嗽作渴自汗發熱便數自用清肺降火理氣滲利之劑服之反小便不通面目赤色唇裂痰壅脾肺腎三脈浮大按之而數此足三陰虧損不能相生當滋化源否則成癰矣不信仍用分利之藥後果患肺癰余用桔梗湯及六味丸而愈一男子面赤吐膿發熱作渴煩躁引飲脈洪數而無倫次先用加減八味丸加麥門大劑一服熱渴頓止即熟睡良久覺而神爽索食再劑諸症頓減仍用前藥更以人參五錢麥門二錢五分五味二錢水煎代茶日飲一劑月餘而安此症面赤者當補肺腎面白者當補脾肺治者驗之一婦人素血虛發熱咳嗽或用痰火之劑後吐膿血面赤脈數其勢甚危此膿成而血氣虛也余用八珍湯以補元氣用桔梗湯以治肺症脈症漸愈一婦人感冒風寒或用發表之劑反咳嗽喘急飲食少思胸膈不利大便不通右寸關脈浮數欲用通利之劑余曰此因脾土虧損不能生肺金若更利之復耗津液心患肺癰矣不信仍利之虛症悉至後果吐膿余朝用益氣湯夕用桔梗湯各數劑吐膿漸止又朝仍前湯夕用十全大補湯各五十餘劑喜其善調理獲愈一婦人咳嗽吐痰胸膈作痛右寸關浮滑項下牽強此脾胃積熱成痰非癰患也以二陳湯加山梔白朮桔梗治之而愈一婦人素血虛內熱時咳甲辰孟冬兩尺浮洪余曰當防患肺症丙午孟春果咳嗽左右寸脈洪數此心火型克肺金而成肺癰也膿已成矣夏令可憂余用壯水健脾之劑稍愈彼不慎調攝果歿於仲夏論胃脘癰十一聖濟總録云胃脘癰由寒氣隔陽熱聚胃口寒熱不調故血肉腐壞以氣逆於胃故胃脈沉細以陽氣不得上升故人迎熱甚令人寒熱如瘧身皮甲錯或咳嗽或嘔膿唾血若脈洪數膿成也急排之脈遲緊瘀血也急下之否則其毒內攻腐爛腸胃矣丹溪先生云內疽者因飲食之毒七情之火相鬱而發用射干湯主之愚常以薏苡仁湯牡丹皮散太乙膏選用之亦效若吐膿血飲食少思助胃壯氣為主而佐以前法不可專治其瘡治驗一男子寒熱作渴不時咳吐口內血腥又五日吐膿身皮甲錯用射干湯四劑膿血已止但氣壅痰多以甘桔湯而愈一男子用射干湯之類將愈但氣喘體倦發熱作渴小便頻數此肺氣不足用補中益氣山藥山茱麥門五味時仲夏更以生脈散代茶飲而愈一婦人素食厚味吐膿已愈但小便淋瀝此肺腎氣虛用補中益氣加麥門五味及加減八味丸而愈若膏粱之人初起宜用清胃散論腸癰十二孫真人云腸癰為病小腹重強按之則痛小便如淋時時汗出復惡寒身皮甲錯腹皮急如腫甚者腹脹大轉側有水聲或繞臍生瘡或膿從臍出或從大便下蓋因七情飲食所致治法脈遲緊者未有膿也用大黃湯下之脈洪數者已有膿也用薏苡仁湯排之小腹疼痛小便不利膿壅滯也牡丹皮散主之若大便或臍間出膿者不治內經云腸癰為病不可驚驚則腸斷而死故患是者其坐臥轉側理宜徐緩時少飲薄粥乃服八珍湯固其元氣靜養調理庶可保全其生治驗通府張廷用患之兩月餘矣時出白膿體倦惡寒此邪氣去而中氣虛余用托裡散兼益氣湯而徐徐呷之又令以豬肚肺煮爛取其湯調米粉煮時呷半盞後漸調理而痊一男子裡急後重下膿脹痛此脾氣下陷用排膿散蠟礬丸而愈後因勞復寒熱體倦用補中益氣湯而安一婦人小腹脹痛小便如淋時時汗出此瘀血凝結於內先以神效栝蔞散二劑少愈更以薏苡仁湯而愈一婦人小腹脹痛而有塊脈芤而澀此瘀血為患也以四物加玄胡索紅花桃仁牛膝木香二劑血下而痊一婦人小腹脹痛大便祕澀轉側有水聲脈洪數此膿瘀內潰也以梅仁湯一劑下瘀血諸症悉退再以薏苡仁湯二劑而瘥一婦人膿成脹痛小便不利脈洪數此膿毒內潰也服太乙膏三錢膿下甚多更以栝蔞散蠟礬丸及托裡散而安如用雲母膏尤妙一婦人産後惡血不止小腹作痛服栝子仁湯下瘀血而痊凡瘀血停滯宜急治之緩則腐化為膿最為難若流注關節則為敗症論腹癰十三男婦同用腹癰謂瘡生於肚腹或生於皮裡膜外屬膏粱厚味七情鬱火若漫腫堅硬肉色不變或脈遲緊未成膿也四君加芎歸白芷枳殼或托裡散腫軟色赤或脈洪數已成膿也托裡消毒散膿成而不外潰者氣血虛也臥針而刺之腫焮作痛者邪氣實也先用仙方活命飲隔蒜灸以殺其毒後用托裡散以補其氣若初起欲其內消當助胃壯氣使根本堅固而以行經活血之藥佐之若以克伐之劑欲其內消則腫者不能潰潰者不能斂若用疏利之藥下其膿則少壯者多為難治老弱者立見危亡亦有食積疝氣類此者見保嬰粹要治驗司馬李梧山患此腹痛而勢已成用活命飲一劑痛頓止用托裡消毒散腫頓起此膿將成也用托裡散補之自潰而愈錦衣掌堂劉廷器正德辛未仲夏腹患癰潰而膿清熱渴腹脹作嘔不食或以為熱毒內攻皆用芩連大黃之劑病愈甚余曰當舍時從症投以參耆薑附等藥一劑嘔止食進再用托裡等劑而瘡愈進士邊云莊腹痛惡寒脈浮數余曰浮數之脈而反惡寒瘡疽之症也不信數日後復請視之左尺洪數余曰內有膿矣仍不信至小腹痛脹連及兩臀始悟余曰膿潰臀矣氣血俱虛何以收斂急用活命飲一鍾臀潰一孔出膿鬥許氣息奄奄用大補藥一劑神思方醒每去後糞從瘡出痛不可當小腹間如有物上挺即發痙不省人事煩躁脈大舉按皆實省而診之脈洪大按之如無以十全大補倍用參耆至四斤更加附子二枚煎膏服而痙止又用十全大補湯五十餘劑而瘡斂上舍周一元腹患癰三月不愈膿水清稀朝寒暮熱服四物黃柏知母之類食少作瀉痰涎上湧服二陳枳殼之類痰涎愈甚胸膈痞悶謂余曰何也余曰朝寒暮熱氣血虛也食少作瀉脾腎虛也痰湧胸痞脾肺虛也悉因真氣虛而邪氣實也當先壯其胃氣使諸臟有所稟而邪自退矣遂用六君加黃耆當歸數劑諸症漸退又用十全大補湯肌肉漸斂更用補中益氣湯調理而痊上舍毛體仁素陰虛春初咳嗽胸中隱痛腎脈數而無力肺脈數而時見此腎脈虧損陰火熾盛用六味地黃丸料一劑服之病勢雖減內癰已成蓋因元氣虛而未能發出火令可畏不信服痰火之劑兩月後乳間微腫脈洪數而無力余曰膿內潰矣當刺出其膿以免內攻之禍不信又月餘請視但針得一孔膿㨮不利仍復內攻唇舌青赤余曰臟腑已壞吾何能治之後果歿從侄孫年十四而𡠚姻乙巳春年二十四腹中氣痛用大黃等藥二劑下血甚多胸腹脹滿痰喘發熱又服破氣降火藥一劑汗出如水手足如冰余他往適歸診之左關洪數右尺尤甚乃腹癰也雖能收斂至夏必變而成瘵症用參耆各一兩歸術各五錢陳皮茯苓各三錢炙草炮姜各一錢二劑諸症少退腹始微赤按之覺痛又二劑作痛又二劑腫痛脈滑數針出膿瘀更用大補湯精神飲食如故因遺精患處色黯用前藥加五味山茱山藥骨脂吳茱等劑瘡痛漸斂瘵症悉具其脈非洪大而數即微細如無惟專服獨參湯人乳汁少復良久仍脫余曰當備後事以俟火旺乃禱鬼神巫者歷言往事如見更示以方藥皆峻利之劑且言保其必生敬信服之後果歿經曰拘於鬼神不可與言至德而況又輕信方藥於邪妄之人耶書此以警後患論流注十四婦人症見婦人良方女科撮要小兒症見保嬰粹要流注或因飲食勞倦脾胃傷損或因房勞陰虛陽氣湊襲或因營氣不從逆於肉理或因腠理不密外邪客之或暴怒傷肝或鬱結傷脾或濕痰流注或跌撲血滯或産後惡露皆因氣虛血注而凝也或生於四肢關節或生於胸腹腰臀或結塊或漫腫或作痛皆由元氣虧損所致也悉宜蔥尉及用益氣養榮湯固其元氣則未成者自消已成者自潰若久而不斂佐以豆豉餅琥珀膏祛散寒邪補接陽氣若內有膿管而不斂者用針頭散腐化之經云形傷痛氣傷腫又曰真氣奪則虛邪氣勝則實若不補氣血節飲食慎起居戒七情而專用寒涼克伐其不死者幸矣治驗侍御朱東溪左脅下近腹肝膽經部分結一塊四寸許漫腫不赤按之則痛余曰此當補脾胃彼謂腫瘍宜表散乃服流氣飲後胃氣頓虛始信余言遂用四君子加芎歸酒炒芍藥薑桂胃氣復而惡症退乃去乾薑加黃耆數劑微赤微痛又三十餘劑焮腫大痛此膿內潰也遂針之用補中益氣加減八味丸而愈一男子元氣素弱臀腫硬而色不變飲食少思如此年餘矣此氣血虛而不能潰也先用六君子湯加川芎當歸芍藥元氣漸復飲食漸進患處漸潰更加黃耆肉桂並用蔥尉之法月餘俟膿熟而針之又以十全大補湯及附子餅尉之而愈一男子腿患腫肉色不變亦不作痛此真氣虛也以補中益氣加茯苓半夏少佐以枳殼木香外用香附餅尉之彼謂氣無補法乃服流氣飲胃氣愈虛余用六君子加芎歸數劑飲食少進再用補劑月餘而消一男子脅腫一塊日久不潰按之微痛脈微而澀此形症俱虛也當補不當瀉乃用人參養榮湯及熱艾尉患處膿成以火針刺之用豆豉餅十全大補湯百劑而愈一男子腹患此腫硬不潰脈弱時嘔欲用敗毒等藥余謂腫硬不潰乃陽氣虛弱嘔吐少食乃胃氣虛寒法當溫補脾胃彼不信仍用攻伐而嘔愈甚復請治脈微弱而發熱余曰熱而脈反靜脫血脈反實汗後脈反躁者皆為逆也辭不治後果歿余北仕時有留都賈學士子年十六患此二載矣公升北宗伯邀余治脈洪大而數膿清熱渴食少體倦夜間盜汗午前畏寒余曰真氣不足邪氣有餘治之無功矣余午前以四君子加芎歸炙草午後以四君子加五味麥門參耆兩月諸症遂可一二又有用滲利之劑保其必生者三月後形體骨立復求余治余時被命南下後竟不救論鶴膝風十五婦人症見婦人良方小兒症見保嬰粹要鶴膝風乃調攝失宜虧損足三陰經風邪乘虛而入以致肌肉日瘦內熱減食肢體攣痛久則膝大而腿細如鶴之膝故名之若傷於脾胃者補中益氣湯為主傷於肝腎者六味丸為主若欲其作膿或潰後十全大補湯為主皆佐以大防風湯初起須以蔥尉可以內消若津涸口乾中氣不足也補中益氣湯加五味子頭暈頭痛陽氣不升也補中益氣湯加蔓荊子發熱晡熱陰血虛弱也用四物參耆白朮畏寒憎寒陽氣虛弱也用十全大補湯飲食少思胸膈膨脹脾胃虛痞也用四君子湯面色痿黃飲食少思脾胃虛弱也用六君子湯膿水清稀肌肉不生氣血俱虛也用八珍湯熱來復去有時而動無根虛火也用十全大補湯形瘦嗜臥寢息發熱痰盛作渴小便頻數五臟虛損也用六味丸臍腹疼痛夜多漩溺腳膝無力頭暈吐痰腎氣冷敗也用八味丸發熱大渴不欲近衣面目赤色脈大而虛血虛發燥也用當歸補血湯或有痢後而患者亦治以前法余當臨症制宜治驗州守張天澤左膝腫痛胸膈痞滿飲食少思時欲作嘔頭暈痰壅日晡益倦此脾肺氣虛用蔥尉法及六君加炮姜諸症頓退飲食少進用補中益氣加蔓荊子頭目清爽間與大防風湯十餘劑又用補中益氣三十餘劑而消通府劉國威先筋攣骨痛右膝漫腫用化痰消毒之劑腫痛益甚食少體倦加祛風消毒等藥寒熱作嘔大便不實用二陳除濕之類腫起色赤內痛如錐余診其脈滑數而無力此膿已成元氣虛而不能潰也用十全大補湯四劑佐以大防風湯一劑而潰又百餘劑而得痊一儒者腿筋弛長月餘兩膝腫痛此陰虛濕熱所乘也用六味丸為主佐以八珍湯加牛膝杜仲間以補中益氣湯三月餘而消一男子腿痛膝腫脈浮按之弦緊此肝腎虛弱也用大防風湯二劑已退彼惑於附子有毒乃服治瘡之藥日漸消瘦虛症漸至復求治余曰倦怠消瘦脾胃衰而不能營運也小便不禁膀胱虛而不能約制也燥熱虛痞胃氣弱而不能化也恍惚健忘精神失而憒亂也惡症蜂集余辭之後果歿論天泡瘡十六天泡瘡屬元氣不足邪氣所乘亦有傳染而患受症在肝腎二經故多在下體發起有先筋骨痛而後患者有先患而後痛者初起脈浮數邪在脾肺經也先用荊防敗毒散解散之脈弦數邪在肝膽經也先用龍膽瀉肝湯清解之脈沉數邪在臟腑也先用內疏黃連湯通導之後用換肌消毒散為主愈後再無筋骨疼痛之患若瘡凸赤作痛熱毒熾甚也瘡微作痛毒將殺也瘡色白而不結痂陽氣虛也色赤而不結痂陰血虛也搔癢脈虛浮氣不能相榮也搔癢脈浮數血不能相榮也臀背間或頸間作癢膀胱陰虛也陰囊間或股內癢肝經血虛也陰囊作癢重墜肝經陰虛濕熱也小便頻數短少色赤肝經陰虛也小便頻數色白短少脾肺氣虛也面目搔癢或搔變赤外邪相搏也眉間癢或毛落肝膽血燥也飲食少思口乾飲湯胃氣虛也飲食不化大便不實脾氣虛也侵晨或夜間泄瀉脾腎虛也若治失其法有蝕傷眼目腐爛玉莖拳攣肢體者但用九味蘆薈丸以清肝火六味丸以生腎水蠲痹解毒散以養血祛邪亦有可生者若誤用輕粉等劑反為難治治驗一儒者患前症先玉莖作癢出水後陰囊股內小腹脅臂發小癗或干膿窠誤服祛風等藥肢體倦怠惡寒發熱飲食漸減大便不實左尺洪數左關弦數右關浮緩按之微弦余曰此患屬肝膽經也左關脈弦左尺脈浮數者腎水少而虛熱傳於肝也右關脈浮緩脾胃之氣弱也按之而弦者肝木乘脾土也用六味地黃丸補中益氣湯為主佐以換肌消毒散而愈一儒者患前症色焮赤作痛大便祕而不實服祛風敗毒等藥舌痛口乾脈浮而數此邪氣去而陰虛所致用六味丸料加山梔當歸四劑脈症頓退又用八珍湯加山梔丹皮瘡色漸白後用四君加歸耆而愈一人患此服攻毒等藥患處凸而色赤作痛肢體倦怠惡寒發熱脈浮而虛此元氣復傷而邪氣實也用補中益氣二劑而痊一儒者患之誤服祛風消毒之藥復傷元氣因勞役過度內熱口乾齒齦作痛右關脈洪數而虛此脾胃受傷而火動用清胃散之類而愈進士劉華甫患之數月用輕粉硃砂等藥頭面背臀各結一塊二寸許潰而形氣消弱寒熱口乾舌燥唇裂小便淋漓痰涎上湧飲食少思此脾胃傷諸臟弱而虛火動也先用六君子二十餘劑又用補中益氣湯加山茱山藥麥門五味服之胃氣復而諸症愈惟小便未清痰涎未止用加減八味丸而痊一儒者患之頭面搔癢或成粒或成片或出水脾肺脈俱洪數此風邪所傷先用荊防敗毒散加萆薢鉤藤鉤數劑漸愈但口乾內熱用四物加山梔鉤藤金銀花甘草節而愈後遍身搔癢內熱口乾佐以六味丸而痊一商人每勞役飲食後則遍身生瘡服祛風敗毒之劑面目胸背臂脅結一塊如桃栗凹凸癢痛膿水淋漓氣血虛甚寒熱往來作渴痰壅此濕熱壅盛元氣虛而不能愈也外敷當歸膏內用補陰八珍加萆薢五錢並換肌消毒散加乾葛鉤藤鉤各一錢二十餘劑諸症漸退仍以前藥為主佐以調理之劑兩月餘血氣復而瘡愈論赤白遊風十七赤白遊風屬脾肺氣虛腠理不密風熱相搏或寒閉腠理內熱拂鬱或陰虛火動外邪所乘或肝火風熱血熱治法若風熱用小柴胡湯加防風連翹血熱用四物加柴胡山梔丹皮風熱相搏用荊防敗毒散內熱外寒用加味羌活散胃氣虛弱用補中益氣湯加羌活防風及消風散血虛用加味逍遙散陰虛逍遙散六味丸若肝腎虛熱用六味丸則火自息風自定癢自止若用祛風辛熱之劑則肝血愈燥風火愈熾元氣愈虛腠理不閉風客內淫腎氣受傷相火翕合血隨火化反為難治矣治驗一男子秋間發疙瘩此元氣虛而外邪所侵也先用九味羌活湯二劑又用補中益氣加羌活而愈後不慎起居盜汗晡熱口乾唾痰體倦懶言用補中益氣湯加減八味丸而愈一婦人身如丹毒搔破膿水淋漓熱渴頭暈日晡益甚用加味逍遙散而愈一婦人患赤白遊風晡熱癢甚余用清肝養血之劑不信乃服大麻風藥臂痛而筋攣又服化痰順氣之劑四肢痿弱而歿一婦人患前症數用風藥煎湯泡洗以致腹脹而歿一女子赤暈如霞作癢發熱用加味小柴胡湯加生地連翹丹皮而愈論疥瘡十八疥瘡屬脾經濕毒積熱或肝經血熱風熱或腎經陰虛發熱其體倦食少為脾經濕熱用補中益氣湯飲冷作痛為脾經積熱用清熱消毒散搔癢發熱為脾虛風熱用人參消風散搔癢作痛為風熱用當歸飲子便祕作痛為熱毒用升麻和氣飲熱渴便利為脾肺虛熱用竹葉黃耆湯內熱晡熱或時寒熱屬肝經血虛風熱用加味逍遙散六味丸體倦少食或盜汗少寢為脾氣鬱結用加味歸脾湯逍遙散地黃丸若發熱盜汗或吐痰口乾者為腎經虛熱用六味丸料煎服治驗稽勳李龍岡遍身患此腿足為甚日晡益焮口乾作渴小便頻赤此腎經虛熱用補中益氣湯六味丸而痊一儒者善嚏患癢余以為內有濕熱腠理不密外邪所搏也與補中益氣湯加白芷川芎治之不從自服荊防敗毒散盜汗發熱作渴焮腫膿水淋漓仍用前藥倍加參耆五味而痊一儒者患在臂腳日晡或癢或脹形體倦怠自服敗毒散痛處發腫小便赤澀此肺腎陰虛余用補中益氣加五味麥門冬而愈一儒者患此誤用攻伐之劑元氣虛而不能愈用補中益氣湯加茯苓其瘡頓愈又因調養失宜日晡益甚用八珍湯加五味麥門五十餘劑而愈一男子色黯作癢出黑血日晡益甚其腿日腫夜消余以為氣血虛而有熱朝用補中益氣湯夕用加味逍遙散而愈一男子時疫愈後所患如用前藥補養而愈有同患用砭法出血而死此因陰虛血熱色黑作癢也何乃反傷陰血哉一婦人久不愈食少體倦此肝脾虧損而虛熱先用補中益氣湯加川芎炒山梔元氣漸復更以逍遙散而瘡漸愈若夜間譫語此熱入血分用小柴胡湯加生地黃治之血虛者四物合小柴胡湯熱退卻用逍遙散以補脾胃生陰血亦有寒熱如瘧亦治以前藥論附骨疽十九附骨疽有因露臥風寒深襲於骨者有因形氣損傷不能起發者有因克伐之劑虧損元氣不能發出者有因外敷寒藥血凝結於內者凡此皆宜灸尉患處解散毒氣補接陽氣溫補脾胃為主若飲食如常先用仙方活命飲解毒散郁隨用六君子湯補托榮氣若體倦食少但用前湯培養諸臟使邪不得勝正若膿已成即針之使毒不得內侵帶生用針亦無妨如用火針亦不痛且使易斂其隔蒜灸能解毒行氣蔥尉法能助陽氣行壅滯此雖不見於方書余常用之大效其功不能盡述惟氣血虛脫者不應治驗南司馬王荊山腿腫作痛寒熱作渴飲食如常脈洪數而有力此足三陽經濕熱壅滯用檳蘇敗毒散一劑而寒熱止再劑而腫痛消更用逍遙散而元氣復兩月後因怒腫痛如錐赤暈散漫用活命飲二劑而痛緩又用八珍湯加柴胡山梔丹皮而痛止復因勞役倦怠懶食腿重頭暈此脾胃氣虛而不能升舉也用補中益氣加蔓荊子而安一儒者左腿微腫肉色如故飲食少思此真氣虛而濕邪內襲也蓋諸氣皆稟於胃法當補胃壯氣遂用六君加藿香木香當歸數劑飲食漸進更以十全大補元氣漸復而愈一儒者兩腿腫痛肉色不變惡寒發熱飲食少思肢體倦怠脾氣不足濕痰下注也以補中益氣加茯苓半夏芍藥二劑寒熱退而腫痛消又十餘劑脾胃壯而形體健一男子患此入房兩臂硬腫二便不通余謂腎開竅於二陰乃肝腎虧損也用六味丸料加車前牛膝而二便利用補中益氣而腫硬消喜其年少得生一上舍內痛如錐肉色如故面黃懶食痛甚作嘔此痛傷胃也用六君子以壯其脾胃用十全大補以助其膿而針之更用前湯倍加參耆芎歸麥門五味遠志貝母而瘡斂一男子因負重飲食失節胸間作痛誤認為瘡毒服大黃等藥右腿股腫肉色如故頭痛惡寒喘渴發熱脈洪大而無力此勞傷元氣藥傷胃氣而然耳用補中益氣湯四劑又用十全大補湯數劑喜其年少而得愈論多骨疽二十多骨疽者由瘡瘍久潰氣血不能營於患處邪氣陷襲久則爛筋腐骨而脫出屬足三陰虧損之症也用補中益氣湯以固根本若陰火發熱者佐以六味丸壯水之主以鎮陽光陽氣虛寒者佐以八味丸益火之源以消陰翳外以附子餅蔥尉法祛散寒邪補接榮氣則骨自脫瘡自斂也夫腎主骨若腎氣虧損其骨漸腫荏苒歲月潰而出骨亦用前法若投以克伐之劑復傷真氣鮮有不誤者治驗舉人於廷器腿患流注年餘出腐骨少許午前畏寒午後發熱口乾痰唾小便頻數余以為足三陰虧損朝用補中益氣湯夕用六味丸料加黃耆當歸五味子各三十餘劑外用豆豉餅諸症漸愈又以十全大補之類喜其慎疾而愈一儒者患附骨疽失於調補瘡口不斂日出清膿少許已而常出三腐骨其脈但數而無邪此氣血虛瘡結膿管而不能愈紝以烏金膏日服十全大補湯而愈上舍王廷璋患前症三年未愈肢體消瘦飲食難化手足並冷大便不通手足陰冷余謂此陽氣虛寒用補中益氣八味丸及灸其患處而痊一男子上齶腫硬年餘方潰內熱作渴肢體消瘦六脈洪大左手尤甚用補中益氣湯六味丸出腐骨一塊仍服前藥諸症悉去瘡口亦斂一男子十六歲間足腫黯潰而露骨體瘦盜汗發熱口乾用十全大補湯六味地黃丸各五十餘劑而愈不然多變瘵症或瀝盡氣血而亡一婦人年三十餘素弱左手背漸腫一年後潰出清膿腫黯連臂內熱晡熱自汗盜汗經水兩月一至此肝脾氣血虧損朝用歸脾湯夕用逍遙散腫處頻用蔥尉法兩月餘諸症漸愈瘡出腐骨仍服前藥前後共三百餘劑得痊論翻花瘡二十一翻花瘡者由瘡瘍潰後肝火血燥生風所致或瘡口胬肉突出如菌大小不同或出如蛇頭長短不一治法當滋肝補氣外塗藜蘆膏胬肉自入須候元氣漸復膿毒將盡塗之有效不然雖入而復潰若誤用刀針蝕藥灸去其勢益甚或出血不止必致寒熱嘔吐等症須大補脾胃為善治驗判官張承恩內股患癰將愈翻出一肉如菌余曰此屬肝經風熱血燥當清肝熱養肝血彼為不然乃內用降火外用追蝕蝕而復翻翻而復蝕其肉益大元氣益虛始信余言遂內用梔子清肝散外用藜蘆膏而痊一上舍素膏粱善怒耳下結一核從潰而瘡口翻張如菌焮連頭痛或胸脅作脹或內熱寒熱或用清熱消毒之藥年餘未瘥余用補中益氣湯六味地黃丸而尋愈一男子背瘡斂如豆許翻出肉寸余用消蝕割擊法屢去屢大此肝經血虛風熱余用加味逍遙散三十餘劑塗藜蘆膏而消又用八珍散倍用參耆歸術而斂一婦人素善怒臂患癰瘡口出肉長二寸許此肝脾鬱怒氣血虛而風內動用加味逍遙散塗藜蘆膏而愈後因怒患處脹悶遍身汗出如雨此肝經風熱風能散氣故耳仍用前散並八珍湯而愈一男子項患腫痰涎湧甚用散堅行氣等劑腫硬愈甚喘氣發熱自汗盜汗體倦食少余曰此屬足三陰虧損當滋化源不信反追蝕患處開翻六寸許㠁巗色赤日出鮮血三月餘矣肝脈弦洪緊實余用大補湯加麥門五味五十餘劑諸症漸愈血止三四復因怒飲食頓少其血湧出此肝傷不能藏肺傷不能攝也用補中益氣湯為主加五味麥門其血頓止再以六味丸加五味子常服瘡口斂至寸許遂不用藥且不守禁而歿
